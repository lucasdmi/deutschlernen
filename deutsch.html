<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Lernen — A1 & A2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F2EBDC;
    --cream-dark: #E8DFCB;
    --ink: #1A1612;
    --ink-soft: #3C342B;
    --paper: #FBF7EE;
    --red: #C8362A;
    --red-soft: #E5A89F;
    --blue: #2B4A7A;
    --blue-soft: #A6BCDA;
    --green: #4F6B3A;
    --green-soft: #B5C9A0;
    --mustard: #C49B3E;
    --gray: #6E665C;
    --gray-soft: #C9C1B3;
    --shadow: 0 2px 0 var(--ink);
    --shadow-deep: 4px 4px 0 var(--ink);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(26,22,18,0.06) 1px, transparent 0);
    background-size: 24px 24px;
  }

  /* ============ HEADER ============ */
  header {
    border-bottom: 2px solid var(--ink);
    background: var(--paper);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .brand-mark {
    display: inline-block;
    width: 32px;
    height: 32px;
    background: var(--red);
    border: 2px solid var(--ink);
    transform: rotate(-3deg);
    position: relative;
    flex-shrink: 0;
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    inset: 4px;
    background: var(--ink);
    clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%, 0 66%, 100% 66%, 100% 100%, 0 100%);
  }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .brand h1 .accent { color: var(--red); font-style: italic; }
  .brand .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-left: 8px;
  }

  .header-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .level-toggle {
    display: flex;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: var(--shadow);
  }
  .level-toggle button {
    background: transparent;
    border: none;
    padding: 8px 20px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink);
    border-right: 2px solid var(--ink);
    transition: background 0.15s;
  }
  .level-toggle button:last-child { border-right: none; }
  .level-toggle button.active {
    background: var(--ink);
    color: var(--cream);
  }
  .level-toggle button:hover:not(.active) { background: var(--cream-dark); }

  .search-box {
    border: 2px solid var(--ink);
    background: var(--paper);
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 200px;
    box-shadow: var(--shadow);
    color: var(--ink);
  }
  .search-box:focus {
    outline: none;
    background: var(--paper);
  }
  .search-box::placeholder { color: var(--gray); }

  /* ============ MODE TABS ============ */
  .mode-bar {
    border-bottom: 2px solid var(--ink);
    background: var(--cream-dark);
    padding: 0 32px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .mode-tab {
    background: transparent;
    border: none;
    border-right: 2px solid var(--ink);
    padding: 14px 24px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .mode-tab:first-child { border-left: 2px solid var(--ink); }
  .mode-tab .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 1px 6px;
  }
  .mode-tab.active {
    background: var(--paper);
    color: var(--ink);
    border-bottom: 2px solid var(--paper);
    margin-bottom: -2px;
    position: relative;
  }
  .mode-tab.active::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    height: 4px;
    background: var(--red);
  }
  .mode-tab:hover:not(.active) { background: var(--cream); }

  /* ============ MAIN LAYOUT ============ */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 140px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 2px solid var(--ink);
    background: var(--paper);
    padding: 24px 0;
    overflow-y: auto;
  }
  .sidebar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 0 24px 12px;
    border-bottom: 1px solid var(--gray-soft);
    margin-bottom: 8px;
  }
  .cat-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cat-btn:hover { background: var(--cream); }
  .cat-btn.active {
    background: var(--cream-dark);
    border-left-color: var(--red);
    font-weight: 700;
  }
  .cat-btn .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
  }
  .cat-btn.all { font-weight: 700; border-bottom: 1px dashed var(--gray-soft); }

  /* MAIN */
  main {
    padding: 32px;
    overflow-y: auto;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-head h2 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .section-head .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ============ BROWSE MODE ============ */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .word-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    position: relative;
  }
  .word-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: var(--shadow-deep);
  }
  .word-card .article {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border: 1.5px solid;
    margin-bottom: 8px;
  }
  .article-der { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }
  .article-die { color: var(--red); border-color: var(--red); background: var(--red-soft); }
  .article-das { color: var(--green); border-color: var(--green); background: var(--green-soft); }
  .article-pl { color: var(--gray); border-color: var(--gray); background: var(--gray-soft); }
  .article-v { color: var(--mustard); border-color: var(--mustard); background: #F2DDAE; }
  .article-adj { color: var(--ink); border-color: var(--ink); background: var(--cream-dark); }

  .word-card .de {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .word-card .translations {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .word-card .translations .lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }
  .word-card .example {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--gray-soft);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    display: none;
  }
  .word-card.expanded .example { display: block; }
  .word-card .example .ex-trans { display: block; font-style: normal; color: var(--gray); font-size: 12px; margin-top: 4px; }

  /* ============ FLASHCARD MODE ============ */
  .flash-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 20px 0;
  }
  .flash-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .flash-progress .bar {
    width: 200px;
    height: 6px;
    background: var(--cream-dark);
    border: 1.5px solid var(--ink);
    position: relative;
    overflow: hidden;
  }
  .flash-progress .bar-fill {
    height: 100%;
    background: var(--red);
    transition: width 0.3s;
  }

  .flashcard {
    width: 100%;
    max-width: 520px;
    aspect-ratio: 3/2;
    perspective: 1200px;
    cursor: pointer;
  }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flash-side {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: var(--shadow-deep);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px;
    text-align: center;
  }
  .flash-side.back { transform: rotateY(180deg); }
  .flash-side .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 14px;
  }
  .flash-side .article {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border: 1.5px solid;
    margin-bottom: 12px;
  }
  .flash-side .main-word {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 44px;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .flash-side .secondary {
    font-size: 17px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .flash-side .ex {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--gray-soft);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 90%;
  }
  .flash-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  .flash-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .flash-btn {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 10px 22px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.1s;
    color: var(--ink);
  }
  .flash-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
  .flash-btn:active { transform: translate(0, 0); box-shadow: var(--shadow); }
  .flash-btn.primary { background: var(--ink); color: var(--cream); }
  .flash-btn.know { background: var(--green-soft); }
  .flash-btn.dont { background: var(--red-soft); }

  /* ============ QUIZ MODE ============ */
  .quiz-stage {
    max-width: 640px;
    margin: 0 auto;
  }
  .quiz-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 32px;
    box-shadow: var(--shadow-deep);
  }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--gray-soft);
  }
  .quiz-score { color: var(--red); font-weight: 600; }

  .quiz-prompt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .quiz-word {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 42px;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 28px;
  }
  .quiz-word .article-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    vertical-align: middle;
    padding: 3px 8px;
    border: 1.5px solid;
    margin-right: 10px;
    transform: translateY(-6px);
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .quiz-option {
    background: var(--cream);
    border: 2px solid var(--ink);
    padding: 14px 18px;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.1s;
    color: var(--ink);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quiz-option:hover:not(:disabled) {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
    background: var(--paper);
  }
  .quiz-option .key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    border: 1px solid var(--gray);
    padding: 1px 5px;
    flex-shrink: 0;
  }
  .quiz-option.correct {
    background: var(--green-soft);
    border-color: var(--green);
  }
  .quiz-option.wrong {
    background: var(--red-soft);
    border-color: var(--red);
  }
  .quiz-option:disabled { cursor: default; }

  .quiz-next {
    margin-top: 20px;
    text-align: center;
  }

  .quiz-summary {
    text-align: center;
    padding: 40px 20px;
  }
  .quiz-summary .big-num {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 72px;
    line-height: 1;
    color: var(--red);
    margin-bottom: 8px;
  }
  .quiz-summary .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 24px;
  }

  /* ============ MATCH MODE ============ */
  .match-stage { max-width: 720px; margin: 0 auto; }
  .match-header {
    text-align: center;
    margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .match-tile {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.1s;
    font-size: 15px;
    color: var(--ink);
    box-shadow: var(--shadow);
    min-height: 56px;
    display: flex;
    align-items: center;
  }
  .match-tile.de { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; }
  .match-tile:hover:not(.matched):not(.selected) {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .match-tile.selected {
    background: var(--ink);
    color: var(--cream);
  }
  .match-tile.matched {
    opacity: 0.35;
    cursor: default;
    background: var(--green-soft);
    box-shadow: none;
  }
  .match-tile.wrong-shake { animation: shake 0.3s; }
  @keyframes shake {
    0%, 100% { transform: translate(0,0); }
    25% { transform: translate(-6px,0); }
    75% { transform: translate(6px,0); }
  }

  /* ============ GRAMMATIK ============ */
  .gram-intro {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-left: 6px solid var(--mustard);
    padding: 18px 22px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .gram-intro strong { color: var(--ink); }
  .gram-block { margin-bottom: 36px; }
  .gram-block h3 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .gram-block .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }
  .gram-table-wrap { overflow-x: auto; border: 2px solid var(--ink); box-shadow: var(--shadow); background: var(--paper); }
  table.gram {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 480px;
  }
  table.gram th, table.gram td {
    border: 1px solid var(--gray-soft);
    padding: 10px 14px;
    text-align: left;
  }
  table.gram thead th {
    background: var(--ink);
    color: var(--cream);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-color: var(--ink);
  }
  table.gram thead th.col-m { background: var(--blue); }
  table.gram thead th.col-f { background: var(--red); }
  table.gram thead th.col-n { background: var(--green); }
  table.gram thead th.col-pl { background: var(--gray); }
  table.gram tbody th {
    background: var(--cream-dark);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink);
    white-space: nowrap;
  }
  table.gram tbody tr.highlight th { background: var(--mustard); color: var(--ink); }
  table.gram tbody tr.highlight td { background: #F7EDD3; font-weight: 600; }
  table.gram td .form { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; }
  table.gram td .hint { display: block; font-size: 11px; color: var(--gray); font-style: italic; margin-top: 2px; }
  table.gram td.de-cell { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; }
  table.gram td.aux-sein { color: var(--red); font-weight: 600; }
  table.gram td.aux-haben { color: var(--blue); font-weight: 600; }

  .gram-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 12px; }
  .gram-item {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 12px 16px;
    box-shadow: var(--shadow);
  }
  .gram-item .head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .gram-item .word { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; }
  .gram-item .gloss { font-size: 13px; color: var(--gray); }
  .gram-item .ex { font-size: 13px; font-style: italic; color: var(--ink-soft); margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--gray-soft); }
  .gram-item .ex .tr { display: block; font-style: normal; color: var(--gray); font-size: 12px; margin-top: 2px; }
  .gram-item .ex b { color: var(--mustard); font-style: normal; }
  .gram-note {
    background: var(--cream-dark);
    border: 1.5px dashed var(--gray);
    padding: 12px 16px;
    margin-top: 14px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .gram-note strong { color: var(--ink); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend .dot { width: 12px; height: 12px; border: 1.5px solid var(--ink); display: inline-block; }
  .legend .dot.sein { background: var(--red-soft); }
  .legend .dot.haben { background: var(--blue-soft); }

  /* ============ TEXTE ============ */
  .text-stage { max-width: 760px; }
  .text-meta-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .text-level-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border: 1.5px solid var(--ink);
    background: var(--mustard);
  }
  .text-toggle-btn {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 6px 16px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    box-shadow: var(--shadow);
    color: var(--ink);
  }
  .text-toggle-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .text-toggle-btn.on { background: var(--ink); color: var(--cream); }
  .text-body {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 28px 32px;
    box-shadow: var(--shadow-deep);
    font-size: 17px;
    line-height: 1.9;
    color: var(--ink);
  }
  .text-body p { margin-bottom: 14px; }
  .text-body p:last-child { margin-bottom: 0; }
  .text-body .vw {
    border-bottom: 2px solid var(--mustard);
    cursor: help;
    position: relative;
  }
  .text-body .trans {
    display: none;
    margin-top: 6px;
    padding-left: 16px;
    border-left: 3px solid var(--blue-soft);
    font-size: 14px;
    line-height: 1.6;
    color: var(--gray);
    font-style: italic;
  }
  .text-body.show-trans .trans { display: block; }
  .text-body .trans .pt-line { display: block; color: var(--green); margin-top: 3px; }

  .text-glossary {
    margin-top: 24px;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: var(--shadow);
  }
  .text-glossary .gloss-head {
    background: var(--cream-dark);
    border-bottom: 2px solid var(--ink);
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink);
  }
  .gloss-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); }
  .gloss-row {
    padding: 9px 18px;
    border-bottom: 1px solid var(--gray-soft);
    border-right: 1px solid var(--gray-soft);
    font-size: 14px;
  }
  .gloss-row .g-de { font-family: 'Fraunces', serif; font-weight: 600; color: var(--ink); }
  .gloss-row .g-en { color: var(--ink-soft); }
  .gloss-row .g-pt { color: var(--green); font-size: 12px; }

  /* ============ AUDIO / SPEAKER BUTTON ============ */
  .speak-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    padding: 0;
    color: var(--ink);
    transition: all 0.12s;
    flex-shrink: 0;
    line-height: 1;
    vertical-align: middle;
  }
  .speak-btn:hover { background: var(--mustard); transform: translate(-1px,-1px); box-shadow: 2px 2px 0 var(--ink); }
  .speak-btn:active { transform: translate(0,0); box-shadow: none; }
  .speak-btn svg { width: 15px; height: 15px; display: block; }
  .speak-btn.speaking { background: var(--mustard); animation: pulseSpk 0.8s ease-in-out infinite; }
  @keyframes pulseSpk { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .speak-btn.lg { width: 38px; height: 38px; border-width: 2px; }
  .speak-btn.lg svg { width: 20px; height: 20px; }
  .speak-unavailable { display: none !important; }

  .word-card .de-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .word-card .de-row .de { margin-bottom: 0; }
  .flash-side .speak-btn { margin-top: 14px; }
  .text-body .vw-speak { margin-left: 2px; }

  /* ============ WRITE / SCHREIBEN MODE ============ */
  .write-stage { max-width: 580px; margin: 0 auto; }
  .write-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 32px;
    box-shadow: var(--shadow-deep);
  }
  .write-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--gray-soft);
  }
  .write-score { color: var(--red); font-weight: 600; }
  .write-prompt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .write-cue {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 34px;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .write-cue-sub { font-size: 15px; color: var(--gray); margin-bottom: 22px; }
  .write-hint-art {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    border: 1px dashed var(--gray);
    padding: 2px 8px;
    margin-bottom: 14px;
  }
  .write-input-row { display: flex; gap: 10px; align-items: stretch; }
  .write-input {
    flex: 1;
    border: 2px solid var(--ink);
    background: var(--cream);
    padding: 14px 16px;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--ink);
    box-shadow: var(--shadow);
  }
  .write-input:focus { outline: none; background: var(--paper); }
  .write-input.correct { background: var(--green-soft); border-color: var(--green); }
  .write-input.wrong { background: var(--red-soft); border-color: var(--red); }
  .write-input.close { background: #F7EDD3; border-color: var(--mustard); }
  .write-feedback {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px dashed var(--gray-soft);
  }
  .write-verdict { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; margin-bottom: 8px; }
  .write-verdict.ok { color: var(--green); }
  .write-verdict.no { color: var(--red); }
  .write-verdict.partly { color: var(--mustard); }
  .write-answer { font-size: 16px; color: var(--ink-soft); margin-bottom: 4px; }
  .write-answer .ans-de { font-family: 'Fraunces', serif; font-weight: 600; color: var(--ink); font-size: 19px; }
  .write-ex { font-style: italic; font-size: 14px; color: var(--ink-soft); margin-top: 10px; }
  .write-ex .tr { display: block; font-style: normal; color: var(--gray); font-size: 12px; margin-top: 2px; }

  /* ============ SRS BADGES ============ */
  .srs-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: var(--shadow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gray);
  }
  .srs-bar .srs-stat { display: inline-flex; align-items: center; gap: 6px; }
  .srs-bar .srs-dot { width: 10px; height: 10px; border: 1.5px solid var(--ink); display: inline-block; }
  .srs-bar .srs-dot.due { background: var(--red-soft); }
  .srs-bar .srs-dot.learning { background: #F7EDD3; }
  .srs-bar .srs-dot.known { background: var(--green-soft); }
  .srs-bar .srs-note { color: var(--ink-soft); text-transform: none; letter-spacing: 0; font-family: 'DM Sans', sans-serif; font-style: italic; }
  .srs-reset {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--gray);
    color: var(--gray);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    cursor: pointer;
  }
  .srs-reset:hover { border-color: var(--red); color: var(--red); }
  .flash-srs-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border: 1px solid;
    position: absolute;
    top: 12px;
    right: 12px;
  }
  .flash-srs-tag.due { color: var(--red); border-color: var(--red); }
  .flash-srs-tag.learning { color: var(--mustard); border-color: var(--mustard); }
  .flash-srs-tag.known { color: var(--green); border-color: var(--green); }

  /* ============ VERBEN — CONJUGATION ============ */
  .verb-head-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-left: 6px solid var(--mustard);
    padding: 18px 22px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .verb-head-card .vh-inf { font-family: 'Fraunces', serif; font-weight: 800; font-size: 30px; letter-spacing: -0.01em; }
  .verb-head-card .vh-en { font-size: 15px; color: var(--gray); }
  .verb-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; padding: 2px 8px; border: 1.5px solid;
  }
  .verb-tag.stark { color: var(--red); border-color: var(--red); background: var(--red-soft); }
  .verb-tag.schwach { color: var(--green); border-color: var(--green); background: var(--green-soft); }
  .verb-tag.gemischt { color: var(--mustard); border-color: var(--mustard); background: #F2DDAE; }
  .verb-tag.modal { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }
  .verb-aux {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft);
    border: 1px dashed var(--gray); padding: 2px 8px;
  }
  .verb-aux b { color: var(--ink); }
  .verb-pp { font-family: 'Fraunces', serif; font-weight: 600; color: var(--ink); }

  .conj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .conj-block { background: var(--paper); border: 2px solid var(--ink); box-shadow: var(--shadow); }
  .conj-block .cb-head {
    background: var(--ink); color: var(--cream);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    padding: 9px 14px; display: flex; justify-content: space-between; align-items: center;
  }
  .conj-block .cb-head .speak-btn { width: 22px; height: 22px; border-color: var(--cream); color: var(--cream); background: transparent; }
  .conj-block .cb-head .speak-btn:hover { background: var(--mustard); border-color: var(--mustard); color: var(--ink); }
  .conj-block .cb-head .speak-btn svg { width: 12px; height: 12px; }
  .conj-row { display: flex; justify-content: space-between; padding: 7px 14px; border-bottom: 1px solid var(--gray-soft); font-size: 14px; }
  .conj-row:last-child { border-bottom: none; }
  .conj-row .pron { color: var(--gray); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .conj-row .form { font-family: 'Fraunces', serif; font-weight: 600; color: var(--ink); }
  .conj-row.alt { background: var(--cream); }

  /* ---- conjugation drill ---- */
  .drill-stage { max-width: 560px; margin: 0 auto; }
  .drill-card { background: var(--paper); border: 2px solid var(--ink); padding: 32px; box-shadow: var(--shadow-deep); }
  .drill-header {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray);
    text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px dashed var(--gray-soft);
  }
  .drill-header .sc { color: var(--red); font-weight: 600; }
  .drill-task { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 12px; }
  .drill-cue { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .drill-verb { font-family: 'Fraunces', serif; font-weight: 700; font-size: 30px; color: var(--ink); }
  .drill-verb-en { font-size: 14px; color: var(--gray); }
  .drill-spec { margin: 14px 0 20px; font-size: 15px; color: var(--ink-soft); }
  .drill-spec .chip {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    border: 1.5px solid var(--ink); padding: 3px 10px; margin-right: 8px; background: var(--cream-dark);
  }
  .drill-spec .pron-chip { font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; color: var(--ink); }
  .drill-input-row { display: flex; gap: 10px; }
  .drill-input {
    flex: 1; border: 2px solid var(--ink); background: var(--cream); padding: 14px 16px;
    font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); box-shadow: var(--shadow);
  }
  .drill-input:focus { outline: none; background: var(--paper); }
  .drill-input.correct { background: var(--green-soft); border-color: var(--green); }
  .drill-input.wrong { background: var(--red-soft); border-color: var(--red); }
  .drill-input.close { background: #F7EDD3; border-color: var(--mustard); }
  .drill-feedback { margin-top: 20px; padding-top: 18px; border-top: 1px dashed var(--gray-soft); }
  .drill-verdict { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; margin-bottom: 8px; }
  .drill-verdict.ok { color: var(--green); }
  .drill-verdict.no { color: var(--red); }
  .drill-verdict.partly { color: var(--mustard); }
  .drill-answer { font-size: 16px; color: var(--ink-soft); }
  .drill-answer .ans { font-family: 'Fraunces', serif; font-weight: 600; color: var(--ink); font-size: 19px; }
  .drill-fullrow { margin-top: 12px; font-size: 13px; color: var(--gray); font-family: 'JetBrains Mono', monospace; line-height: 1.7; }
  .drill-fullrow b { color: var(--ink-soft); font-weight: 600; }

  .verb-cat-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 1px 5px; border: 1px solid var(--gray-soft); color: var(--gray);
  }

  /* ============ SPRECHEN — phrasebook + shadowing ============ */
  .rede-intro {
    background: var(--paper); border: 2px solid var(--ink); border-left: 6px solid var(--mustard);
    padding: 16px 20px; margin-bottom: 22px; box-shadow: var(--shadow);
    font-size: 14px; line-height: 1.6; color: var(--ink-soft);
  }
  .rede-intro strong { color: var(--ink); }
  .rede-list { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 720px) { .rede-list { grid-template-columns: 1fr 1fr; } }
  .rede-card { background: var(--paper); border: 2px solid var(--ink); box-shadow: var(--shadow); padding: 0; overflow: hidden; }
  .rede-you { padding: 14px 16px; }
  .rede-you .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--mustard); margin-bottom: 8px; display: block;
  }
  .rede-you .de-row { display: flex; align-items: flex-start; gap: 10px; }
  .rede-you .de { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; line-height: 1.25; color: var(--ink); flex: 1; }
  .rede-you .tr { font-size: 13px; color: var(--ink-soft); margin-top: 6px; line-height: 1.4; }
  .rede-you .tr .pt { color: var(--green); display: block; margin-top: 2px; }
  .rede-reply {
    padding: 12px 16px; background: var(--cream-dark); border-top: 2px dashed var(--gray-soft);
  }
  .rede-reply .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--blue); margin-bottom: 6px; display: block;
  }
  .rede-reply .de-row { display: flex; align-items: flex-start; gap: 10px; }
  .rede-reply .de { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; color: var(--ink); flex: 1; }
  .rede-reply .tr { font-size: 12px; color: var(--gray); margin-top: 4px; }
  .rede-reply .tr .pt { color: var(--green); display: block; margin-top: 1px; }
  .rede-reply .speak-btn { width: 24px; height: 24px; }
  .rede-reply .speak-btn svg { width: 13px; height: 13px; }

  /* ---- shadowing drill ---- */
  .shadow-stage { max-width: 560px; margin: 0 auto; }
  .shadow-card { background: var(--paper); border: 2px solid var(--ink); padding: 30px; box-shadow: var(--shadow-deep); text-align: center; }
  .shadow-progress {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray);
    text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 22px;
    display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap;
  }
  .shadow-progress .bar { width: 160px; height: 6px; background: var(--cream-dark); border: 1.5px solid var(--ink); overflow: hidden; }
  .shadow-progress .bar-fill { height: 100%; background: var(--mustard); transition: width 0.3s; }
  .shadow-cat {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--mustard); margin-bottom: 16px;
  }
  .shadow-meaning { font-size: 14px; color: var(--gray); margin-bottom: 4px; }
  .shadow-prompt { font-size: 19px; color: var(--ink); font-weight: 500; margin-bottom: 6px; }
  .shadow-prompt-pt { font-size: 14px; color: var(--green); margin-bottom: 24px; }
  .shadow-listen {
    display: inline-flex; align-items: center; gap: 10px; background: var(--ink); color: var(--cream);
    border: 2px solid var(--ink); padding: 14px 26px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px;
    cursor: pointer; box-shadow: var(--shadow); transition: all 0.12s;
  }
  .shadow-listen:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .shadow-listen svg { width: 20px; height: 20px; }
  .shadow-listen.speaking { background: var(--mustard); color: var(--ink); animation: pulseSpk 0.8s ease-in-out infinite; }
  .shadow-instruction { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.12em; margin: 18px 0; }
  .shadow-actions { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .shadow-peek-btn {
    display: inline-flex; align-items: center; gap: 8px; background: var(--paper); color: var(--ink);
    border: 2px solid var(--ink); padding: 14px 20px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px;
    cursor: pointer; box-shadow: var(--shadow); transition: all 0.12s;
  }
  .shadow-peek-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .shadow-peek-btn.on { background: var(--cream-dark); }
  .shadow-peek-btn svg { width: 17px; height: 17px; }
  .shadow-peek-line {
    margin: 16px 0 4px; padding: 12px 16px; background: #F7EDD3; border: 1.5px dashed var(--mustard);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .shadow-peek-line .pk-de { font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px; color: var(--ink); line-height: 1.25; }
  .shadow-peek-line .speak-btn { border-color: var(--mustard); }
  .shadow-answer { margin-top: 8px; padding-top: 22px; border-top: 1px dashed var(--gray-soft); }
  .shadow-de { font-family: 'Fraunces', serif; font-weight: 700; font-size: 26px; line-height: 1.25; color: var(--ink); margin-bottom: 8px; }
  .shadow-reply-block { margin-top: 16px; padding: 12px 16px; background: var(--cream-dark); border: 1.5px dashed var(--gray); text-align: left; }
  .shadow-reply-block .tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--blue); display: block; margin-bottom: 4px; }
  .shadow-reply-block .r-de { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; color: var(--ink); }
  .shadow-reply-block .r-tr { font-size: 12px; color: var(--gray); margin-top: 3px; }
  .shadow-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 22px; }

  /* ============ HÖREN — listening comprehension ============ */
  .hoeren-stage { max-width: 580px; margin: 0 auto; }
  .hoeren-card { background: var(--paper); border: 2px solid var(--ink); padding: 28px; box-shadow: var(--shadow-deep); }
  .hoeren-top {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray);
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 18px;

  .num-chip {
    background: var(--paper); border: 2px solid var(--ink); box-shadow: var(--shadow); padding: 10px 12px;

  .empty {
    text-align: center;

    font-style: italic;
  }

</head>

const PRONOUNS = ["ich", "du", "er/sie/es", "wir", "ihr", "sie/Sie"];
const TENSES = ["Präsens", "Präteritum", "Perfekt", "Plusquamperfekt", "Futur I", "Konjunktiv II"];
const VERB_CLASS_LABEL = { stark: "stark", schwach: "schwach", gemischt: "gemischt", modal: "Modalverb" };

// Helper: present-tense forms of an auxiliary by infinitive
function auxPraesByInf(inf) {
  const v = VERBS.find(x => x.inf === inf);
  return conjPraesens(v);
}

function stemOf(inf) {
  if (inf.endsWith("en")) return inf.slice(0, -2);
  if (inf.endsWith("n")) return inf.slice(0, -1); // (not used by current set except tun, which overrides)
  return inf;
}
function endsTDcluster(s) {
  return /[td]$/.test(s) || /(ffn|chn|tm|gn)$/.test(s);
}
function endsSibilant(s) {
  return /(s|ss|ß|z|x)$/.test(s);
}

// PRÄSENS
function conjPraesens(v) {
  if (v.praes) return v.praes.slice();
  const stem = stemOf(v.inf);
  const ich = stem + "e";
  let du;
  if (v.du2) du = v.du2;
  else if (endsSibilant(stem)) du = stem + "t";
  else if (endsTDcluster(stem)) du = stem + "est";
  else du = stem + "st";
  let er;
  if (v.er3) er = v.er3;
  else if (endsTDcluster(stem)) er = stem + "et";
  else er = stem + "t";
  const wir = v.inf;
  const ihr = endsTDcluster(stem) ? stem + "et" : stem + "t";
  const sie = v.inf;
  return [ich, du, er, wir, ihr, sie];
}

// PRÄTERITUM
function conjPraeteritum(v) {
  const p = v.prat;
  if (v.type === "weak") {
    // prat ends in -e (machte, hatte, konnte, dachte)
    return [p, p + "st", p, p + "n", p + "t", p + "n"];
  }
  // strong: bare stem
  const du = (endsTDcluster(p) || endsSibilant(p)) ? p + "est" : p + "st";
  const ihr = endsTDcluster(p) ? p + "et" : p + "t";
  return [p, du, p, p + "en", ihr, p + "en"];
}

// PERFEKT  (aux präsens + Partizip II)
function conjPerfekt(v) {
  const a = auxPraesByInf(v.aux === "s" ? "sein" : "haben");
  return a.map(f => f + " " + v.pp);
}
// PLUSQUAMPERFEKT (aux präteritum + Partizip II)
function conjPlusquam(v) {
  const a = v.aux === "s"
    ? ["war", "warst", "war", "waren", "wart", "waren"]
    : ["hatte", "hattest", "hatte", "hatten", "hattet", "hatten"];
  return a.map(f => f + " " + v.pp);
}
// FUTUR I  (werden präsens + Infinitiv)
function conjFutur(v) {
  const w = ["werde", "wirst", "wird", "werden", "werdet", "werden"];
  return w.map(f => f + " " + v.inf);
}
// KONJUNKTIV II  (simple stem if available, else würde + Infinitiv)
function conjKonjunktiv(v) {
  if (v.k2) {
    const k = v.k2; // ends in -e
    return [k, k + "st", k, k + "n", k + "t", k + "n"];
  }
  const w = ["würde", "würdest", "würde", "würden", "würdet", "würden"];
  return w.map(f => f + " " + v.inf);
}

function conjugateAll(v) {
  return {
    "Präsens": conjPraesens(v),
    "Präteritum": conjPraeteritum(v),
    "Perfekt": conjPerfekt(v),
    "Plusquamperfekt": conjPlusquam(v),
    "Futur I": conjFutur(v),
    "Konjunktiv II": conjKonjunktiv(v)
  };
}
function conjFormFor(v, tense, personIdx) {
  return conjugateAll(v)[tense][personIdx];
}

/* German number → words, 0–100. Regular enough to generate. */
function germanNumber(n) {
  const ones = ['null','eins','zwei','drei','vier','fünf','sechs','sieben','acht','neun'];
  const teens = { 10:'zehn',11:'elf',12:'zwölf',13:'dreizehn',14:'vierzehn',15:'fünfzehn',16:'sechzehn',17:'siebzehn',18:'achtzehn',19:'neunzehn' };
  const tens = { 20:'zwanzig',30:'dreißig',40:'vierzig',50:'fünfzig',60:'sechzig',70:'siebzig',80:'achtzig',90:'neunzig' };
  if (n === 100) return 'hundert';
  if (n < 10) return ones[n];
  if (n < 20) return teens[n];
  if (n % 10 === 0) return tens[n];
  const o = n % 10, t = Math.floor(n / 10) * 10;
  const onesWord = o === 1 ? 'ein' : ones[o];   // einundzwanzig
  return onesWord + 'und' + tens[t];
}

/* =========================================================================
   UTILITIES
   ========================================================================= */
function currentWords() {
  const levelData = VOCAB[state.level];
  let words = [];
  if (state.category === 'all') {
    for (const cat in levelData) {
      levelData[cat].forEach(w => words.push({ ...w, cat }));
    }
  } else if (levelData[state.category]) {
    levelData[state.category].forEach(w => words.push({ ...w, cat: state.category }));
  }
  if (state.search.trim()) {
    const q = state.search.toLowerCase();
    words = words.filter(w =>
      w.de.toLowerCase().includes(q) ||
      w.en.toLowerCase().includes(q) ||
      w.pt.toLowerCase().includes(q)
    );
  }
  return words;
}

function articleClass(art) {
  if (!art) return '';
  if (art === 'der') return 'article-der';
  if (art === 'die') return 'article-die';
  if (art === 'das') return 'article-das';
  if (art === 'pl') return 'article-pl';
  if (art === 'v') return 'article-v';
  if (art === 'adj') return 'article-adj';
  return '';
}

function articleLabel(art) {
  if (!art) return '';
  if (art === 'pl') return 'die (pl)';
  if (art === 'v') return 'verb';
  if (art === 'adj') return 'adj.';
  return art;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* =========================================================================
   AUDIO — browser Web Speech API (no files, works offline)
   ========================================================================= */
const SPEECH_OK = typeof window !== 'undefined'
  && 'speechSynthesis' in window
  && typeof SpeechSynthesisUtterance !== 'undefined';
let deVoice = null;

function pickGermanVoice() {
  if (!SPEECH_OK) return;
  const voices = window.speechSynthesis.getVoices() || [];
  // Prefer a de-DE voice; fall back to any German voice
  deVoice = voices.find(v => v.lang === 'de-DE')
        || voices.find(v => /^de(-|_)/i.test(v.lang))
        || voices.find(v => /german|deutsch/i.test(v.name))
        || null;
}
if (SPEECH_OK) {
  pickGermanVoice();
  // Voices often load asynchronously
  window.speechSynthesis.onvoiceschanged = pickGermanVoice;
}

function speakGerman(text, btnEl) {
  if (!SPEECH_OK) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE';
    if (deVoice) u.voice = deVoice;
    u.rate = 0.78;
    u.pitch = 1.0;
    if (btnEl) {
      btnEl.classList.add('speaking');
      u.onend = u.onerror = () => btnEl.classList.remove('speaking');
    }
    window.speechSynthesis.speak(u);
  } catch (e) { /* silently ignore */ }
}

// Strips articles/labels so TTS reads the word cleanly. Keeps der/die/das (useful to hear gender).
function speakablePhrase(w) {
  if (w.art === 'der' || w.art === 'die' || w.art === 'das') return w.art + ' ' + w.de;
  return w.de;
}

function speakerBtnHTML(extraClass) {
  const cls = 'speak-btn' + (extraClass ? ' ' + extraClass : '') + (SPEECH_OK ? '' : ' speak-unavailable');
  // Tabler-style outline volume icon

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

}

// Wires up every [data-speak] button within a container to speak the given text.
function wireSpeaker(scopeEl, text) {
  if (!scopeEl) return;
  const btn = scopeEl.querySelector('[data-speak]');
  if (btn) {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      speakGerman(text, btn);
    });
  }
}

/* =========================================================================
   SPACED REPETITION (SRS) — lightweight Leitner-style scheduling.
   Persists to localStorage when available; degrades to in-memory otherwise.
   Each word keyed by level::de. Record: { box, due } where box 0..5 and
   due is a "session counter" so due words resurface sooner.
   ========================================================================= */
const SRS_KEY = 'deutsch_srs_v1';
let srsStore = {};
let srsPersist = false;
let srsSessionCounter = 0;

(function initSrsStore() {
  try {
    const raw = window.localStorage.getItem(SRS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      srsStore = parsed.store || {};
      srsSessionCounter = parsed.counter || 0;
    }
    // probe write access
    window.localStorage.setItem(SRS_KEY + '_probe', '1');
    window.localStorage.removeItem(SRS_KEY + '_probe');
    srsPersist = true;
  } catch (e) {
    srsPersist = false; // in-memory only (e.g. sandboxed preview)
  }
})();

function srsSave() {
  if (!srsPersist) return;
  try {
    window.localStorage.setItem(SRS_KEY, JSON.stringify({ store: srsStore, counter: srsSessionCounter }));
  } catch (e) { /* ignore quota / access errors */ }
}

function srsKey(w) { return state.level + '::' + w.de; }

function srsGet(w) {
  return srsStore[srsKey(w)] || { box: 0, due: 0 };
}

// Leitner intervals per box (in "sessions"). Higher box = seen less often.
const SRS_INTERVAL = [0, 1, 2, 4, 7, 12];

function srsUpdate(w, correct) {
  const k = srsKey(w);
  const rec = srsStore[k] || { box: 0, due: 0 };
  if (correct) rec.box = Math.min(5, rec.box + 1);
  else rec.box = Math.max(0, rec.box - 1);
  rec.due = srsSessionCounter + SRS_INTERVAL[rec.box];
  rec.seen = (rec.seen || 0) + 1;
  srsStore[k] = rec;
  srsSave();
}

function srsTier(w) {
  const rec = srsStore[srsKey(w)];
  if (!rec || rec.box === 0) return 'due';
  if (rec.box >= 4) return 'known';
  return 'learning';
}

// Orders a word list so due/weak words come first, then by box ascending,
// with light shuffling inside each tier to avoid identical sessions.
function srsOrder(words) {
  const withMeta = words.map(w => {
    const rec = srsStore[srsKey(w)] || { box: 0, due: 0 };
    const isDue = rec.due <= srsSessionCounter;
    return { w, box: rec.box, isDue, r: Math.random() };
  });
  withMeta.sort((a, b) => {
    if (a.isDue !== b.isDue) return a.isDue ? -1 : 1; // due first
    if (a.box !== b.box) return a.box - b.box;         // weaker first
    return a.r - b.r;                                  // shuffle within tier
  });
  return withMeta.map(m => m.w);
}

function srsCounts(words) {
  let due = 0, learning = 0, known = 0;
  words.forEach(w => {
    const t = srsTier(w);
    if (t === 'due') due++;
    else if (t === 'learning') learning++;
    else known++;
  });
  return { due, learning, known };
}

function srsResetLevel() {
  const prefix = state.level + '::';
  Object.keys(srsStore).forEach(k => { if (k.startsWith(prefix)) delete srsStore[k]; });
  srsSave();
}

// Normalizes a typed answer for forgiving comparison.
function normalizeAnswer(s) {
  return String(s).trim().toLowerCase()
    .replace(/\s+/g, ' ')
    .replace(/[.!?,;:]+$/, '');
}
// Strips a leading article so "Tisch" matches "der Tisch" partially.
function stripArticle(s) {
  return s.replace(/^(der|die|das)\s+/i, '').trim();
}
// Levenshtein distance for "almost correct" feedback.
function editDistance(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + cost);
    }
  }
  return dp[m][n];
}

function initFlashDeck() {
  const words = currentWords();
  state.flashDeck = state.srsEnabled ? srsOrder(words) : shuffle(words);
  state.flashIdx = 0;
  state.flashFlipped = false;
  state.flashStats = { known: 0, unknown: 0 };
}

function srsBarHTML(words) {
  const c = srsCounts(words);
  const persistNote = srsPersist
    ? 'Progress saved on this device.'
    : 'Progress kept for this session only.';
  return `<div class="srs-bar">
    <span class="srs-stat"><span class="srs-dot due"></span> Fällig ${c.due}</span>
    <span class="srs-stat"><span class="srs-dot learning"></span> Lernen ${c.learning}</span>
    <span class="srs-stat"><span class="srs-dot known"></span> Gewusst ${c.known}</span>
    <span class="srs-note">${persistNote}</span>
    <button class="srs-reset" id="srsReset">Fortschritt zurücksetzen</button>
  </div>`;
}

function renderFlash() {
  if (!state.flashDeck.length) {
    initFlashDeck();
  }
  const words = state.flashDeck;
  if (!words.length) {
    document.getElementById('main').innerHTML = `<div class="empty">Keine Karten. No cards to show.</div>`;
    return;
  }

  if (state.flashIdx >= words.length) {
    // advance the SRS session clock once a full pass completes
    srsSessionCounter++;
    srsSave();
    const total = state.flashStats.known + state.flashStats.unknown;
    document.getElementById('main').innerHTML = `
      <div class="section-head">
        <h2>Geschafft!</h2>
        <span class="meta">${state.level} · Flashcard Session</span>
      </div>
      <div class="quiz-summary">
        <div class="big-num">${state.flashStats.known}/${total}</div>
        <div class="label">Bekannte Wörter${state.srsEnabled ? ' · weak words return sooner' : ''}</div>
        <button class="flash-btn primary" id="flashRestart">Neu starten</button>
      </div>
    `;
    document.getElementById('flashRestart').addEventListener('click', () => {
      initFlashDeck();
      renderFlash();
    });
    return;
  }

  const w = words[state.flashIdx];
  const pct = ((state.flashIdx) / words.length) * 100;
  const tier = srsTier(w);
  const tierLabel = { due: 'Fällig', learning: 'Lernen', known: 'Gewusst' }[tier];

  const html = `
    <div class="section-head">
      <h2>Flashcards</h2>
      <span class="meta">${state.level} · ${state.category === 'all' ? 'Alle Kategorien' : state.category}</span>
    </div>
    ${state.srsEnabled ? srsBarHTML(currentWords()) : ''}
    <div class="flash-stage">
      <div class="flash-progress">
        <span>Karte ${state.flashIdx + 1} / ${words.length}</span>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span>✓ ${state.flashStats.known} · ✗ ${state.flashStats.unknown}</span>
      </div>
      <div class="flashcard ${state.flashFlipped ? 'flipped' : ''}" id="flashcard">
        <div class="flashcard-inner">
          <div class="flash-side front">
            ${state.srsEnabled ? `<span class="flash-srs-tag ${tier}">${tierLabel}</span>` : ''}
            <span class="label">Deutsch</span>
            ${w.art ? `<span class="article ${articleClass(w.art)}">${articleLabel(w.art)}</span>` : ''}
            <div class="main-word">${escapeHtml(w.de)}</div>
            ${speakerBtnHTML('lg')}
            <div class="flash-hint" style="margin-top:18px">Klicken zum Umdrehen</div>
          </div>
          <div class="flash-side back">
            <span class="label">EN · PT</span>
            <div class="main-word" style="font-size:32px">${escapeHtml(w.en)}</div>
            <div class="secondary">${escapeHtml(w.pt)}</div>
            <div class="ex"><em>${escapeHtml(w.ex)}</em><br><span style="font-size:12px;color:var(--gray)">${escapeHtml(w.exTr)}</span></div>
          </div>
        </div>
      </div>
      <div class="flash-controls">
        <button class="flash-btn dont" id="flashDont">Nochmal üben ✗</button>
        <button class="flash-btn" id="flashFlip">${state.flashFlipped ? 'Frage' : 'Antwort'}</button>
        <button class="flash-btn know" id="flashKnow">Gewusst ✓</button>
      </div>
    </div>
  `;
  document.getElementById('main').innerHTML = html;

  const card = document.getElementById('flashcard');
  // speaker button lives on the front face; wire it without flipping the card
  wireSpeaker(card, speakablePhrase(w));
  card.addEventListener('click', (e) => {
    if (e.target.closest('[data-speak]')) return;
    state.flashFlipped = !state.flashFlipped;
    renderFlash();
  });
  document.getElementById('flashFlip').addEventListener('click', (e) => {
    e.stopPropagation();
    state.flashFlipped = !state.flashFlipped;
    renderFlash();
  });
  document.getElementById('flashKnow').addEventListener('click', (e) => {
    e.stopPropagation();
    if (state.srsEnabled) srsUpdate(w, true);
    state.flashStats.known++;
    state.flashIdx++;
    state.flashFlipped = false;
    renderFlash();
  });
  document.getElementById('flashDont').addEventListener('click', (e) => {
    e.stopPropagation();
    if (state.srsEnabled) srsUpdate(w, false);
    state.flashStats.unknown++;
    state.flashIdx++;
    state.flashFlipped = false;
    renderFlash();
  });
  const resetBtn = document.getElementById('srsReset');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      srsResetLevel();
      initFlashDeck();
      renderFlash();
    });
  }
}

/* =========================================================================
   WRITE / SCHREIBEN MODE — active recall: type the German from EN/PT cue
   ========================================================================= */
function initWriteDeck() {
  const words = currentWords();
  state.writeDeck = (state.srsEnabled ? srsOrder(words) : shuffle(words)).slice(0, Math.min(15, words.length));
  state.writeIdx = 0;
  state.writeScore = 0;
  state.writeAnswered = false;
}

function evaluateAnswer(input, w) {
  const guess = normalizeAnswer(input);
  if (!guess) return { verdict: 'no' };

  const target = normalizeAnswer(w.de);
  const targetNoArt = normalizeAnswer(stripArticle(w.de));
  const guessNoArt = normalizeAnswer(stripArticle(input));

  // Exact (with or without article)
  if (guess === target) return { verdict: 'ok', exact: true };
  if (guessNoArt === targetNoArt) {
    // correct word — but did they need an article and miss/wrong it?
    const needsArticle = (w.art === 'der' || w.art === 'die' || w.art === 'das');
    if (needsArticle && guess !== target) {
      return { verdict: 'partly', reason: 'article' };
    }
    return { verdict: 'ok', exact: true };
  }
  // Almost — small typo (edit distance 1 on the no-article form)
  if (targetNoArt.length >= 4 && editDistance(guessNoArt, targetNoArt) <= 1) {
    return { verdict: 'partly', reason: 'typo' };
  }
  return { verdict: 'no' };
}

function renderWrite() {
  if (!state.writeDeck.length) initWriteDeck();
  if (!state.writeDeck.length) {
    document.getElementById('main').innerHTML = `<div class="empty">Keine Wörter zum Üben.</div>`;
    return;
  }

  if (state.writeIdx >= state.writeDeck.length) {
    srsSessionCounter++; srsSave();
    const total = state.writeDeck.length;
    const pct = Math.round((state.writeScore / total) * 100);
    document.getElementById('main').innerHTML = `
      <div class="section-head"><h2>Fertig!</h2><span class="meta">${state.level} · Schreiben</span></div>
      <div class="quiz-summary">
        <div class="big-num">${state.writeScore}/${total}</div>
        <div class="label">${pct}% richtig geschrieben</div>
        <button class="flash-btn primary" id="writeRestart">Nochmal</button>
      </div>
    `;
    document.getElementById('writeRestart').addEventListener('click', () => { initWriteDeck(); renderWrite(); });
    return;
  }

  const w = state.writeDeck[state.writeIdx];
  const needsArticle = (w.art === 'der' || w.art === 'die' || w.art === 'das');

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>Schreiben</h2>
      <span class="meta">${state.level} · Type the German</span>
    </div>
    <div class="write-stage">
      <div class="write-card">
        <div class="write-header">
          <span>Wort ${state.writeIdx + 1} / ${state.writeDeck.length}</span>
          <span class="write-score">Punkte: ${state.writeScore}</span>
        </div>
        <div class="write-prompt-label">Schreibe auf Deutsch</div>
        <div class="write-cue">${escapeHtml(w.en)}</div>
        <div class="write-cue-sub">${escapeHtml(w.pt)}</div>
        ${needsArticle ? `<div class="write-hint-art">Tipp: mit Artikel (der / die / das)</div>` : ''}
        <div class="write-input-row">
          <input class="write-input" id="writeInput" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="…" />
          ${speakerBtnHTML('lg')}
        </div>
        <div id="writeFeedback"></div>
      </div>
    </div>
  `;

  const input = document.getElementById('writeInput');
  const feedback = document.getElementById('writeFeedback');
  // Speaker reads the correct answer (useful after answering, but available anytime)
  wireSpeaker(document.querySelector('.write-input-row'), speakablePhrase(w));

  function submit() {
    if (state.writeAnswered) { advance(); return; }
    const res = evaluateAnswer(input.value, w);
    state.writeAnswered = true;
    const correct = res.verdict === 'ok';
    if (correct) state.writeScore++;
    if (state.srsEnabled) srsUpdate(w, correct);

    input.classList.add(res.verdict === 'ok' ? 'correct' : res.verdict === 'partly' ? 'close' : 'wrong');
    input.disabled = true;

    let verdictText, verdictClass;
    if (res.verdict === 'ok') { verdictText = 'Richtig! ✓'; verdictClass = 'ok'; }
    else if (res.verdict === 'partly' && res.reason === 'article') { verdictText = 'Fast — falscher/fehlender Artikel'; verdictClass = 'partly'; }
    else if (res.verdict === 'partly' && res.reason === 'typo') { verdictText = 'Fast — kleiner Tippfehler'; verdictClass = 'partly'; }
    else { verdictText = 'Nicht ganz ✗'; verdictClass = 'no'; }

    feedback.innerHTML = `
      <div class="write-feedback">
        <div class="write-verdict ${verdictClass}">${verdictText}</div>
        <div class="write-answer">Antwort: <span class="ans-de">${escapeHtml(w.de)}</span></div>
        <div class="write-ex"><em>${escapeHtml(w.ex)}</em><span class="tr">${escapeHtml(w.exTr)}</span></div>
        <div style="margin-top:16px"><button class="flash-btn primary" id="writeNext">Weiter →</button></div>
      </div>
    `;
    document.getElementById('writeNext').addEventListener('click', advance);
  }

  function advance() {
    state.writeIdx++;
    state.writeAnswered = false;
    renderWrite();
  }

  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
  input.focus();
}

   ========================================================================= */
function initQuizDeck() {
  state.quizDeck = shuffle(currentWords()).slice(0, Math.min(15, currentWords().length));
  state.quizIdx = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  state.quizSelectedOption = null;
  state.quizCorrectOption = null;
}

function buildQuizQuestion(idx) {
  const allWords = currentWords();
  const correct = state.quizDeck[idx];
  const distractors = shuffle(allWords.filter(w => w.de !== correct.de)).slice(0, 3);
  const options = shuffle([correct, ...distractors]);
  return { correct, options };
}

let currentQuizQ = null;

function renderQuiz() {
  if (state.quizDeck.length === 0) initQuizDeck();

  if (state.quizDeck.length === 0) {
    document.getElementById('main').innerHTML = `<div class="empty">Nicht genug Wörter für ein Quiz.</div>`;
    return;
  }

  if (state.quizIdx >= state.quizDeck.length) {
    const total = state.quizDeck.length;
    const pct = Math.round((state.quizScore / total) * 100);
    document.getElementById('main').innerHTML = `
      <div class="section-head"><h2>Quiz beendet</h2><span class="meta">${state.level}</span></div>
      <div class="quiz-summary">
        <div class="big-num">${state.quizScore}/${total}</div>
        <div class="label">${pct}% korrekt</div>
        <button class="flash-btn primary" id="quizRestart">Neues Quiz</button>
      </div>
    `;
    document.getElementById('quizRestart').addEventListener('click', () => {
      initQuizDeck();
      currentQuizQ = null;
      renderQuiz();
    });
    return;
  }

  if (!state.quizAnswered) {
    currentQuizQ = buildQuizQuestion(state.quizIdx);
  }
  const q = currentQuizQ;

  let html = `
    <div class="section-head">
      <h2>Quiz</h2>
      <span class="meta">${state.level} · Multiple Choice</span>
    </div>
    <div class="quiz-stage">
      <div class="quiz-card">
        <div class="quiz-header">
          <span>Frage ${state.quizIdx + 1} / ${state.quizDeck.length}</span>
          <span class="quiz-score">Punkte: ${state.quizScore}</span>
        </div>
        <div class="quiz-prompt">Was bedeutet auf Englisch?</div>
        <div class="quiz-word">
          ${q.correct.art && (q.correct.art === 'der' || q.correct.art === 'die' || q.correct.art === 'das') ? `<span class="article-tag ${articleClass(q.correct.art)}">${q.correct.art}</span>` : ''}
          ${escapeHtml(q.correct.de)}
        </div>
        <div class="quiz-options">
  `;

    html += `<button class="${cls}" data-i="${i}" ${state.quizAnswered ? 'disabled' : ''}>
      <span class="key">${letter}</span><span>${escapeHtml(opt.en)}</span>

  });
  html += `
        </div>

          <div class="quiz-next">

            </div>

          </div>
        ` : ''}

  `;

  if (!state.quizAnswered) {
    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('click', () => {

        state.quizSelectedOption = i;
        state.quizAnswered = true;

          state.quizScore++;
        }
        renderQuiz();

    });
  } else {
    document.getElementById('quizNext').addEventListener('click', () => {
      state.quizIdx++;

      state.quizSelectedOption = null;

}

/* =========================================================================
   MATCH MODE
   ========================================================================= */
function initMatch() {
  const pool = shuffle(currentWords()).slice(0, 8);
  const deTiles = pool.map(w => ({ id: w.de, type: 'de', text: w.de, art: w.art }));
  const enTiles = pool.map(w => ({ id: w.de, type: 'en', text: w.en }));
  state.matchTiles = shuffle([...deTiles, ...enTiles]).map((t, i) => ({ ...t, key: i, matched: false }));
  state.matchSelected = null;
  state.matchPairsCount = 0;
}

function renderMatch() {
  if (!state.matchTiles.length) initMatch();
  const allMatched = state.matchTiles.every(t => t.matched);

  if (allMatched && state.matchTiles.length) {
    document.getElementById('main').innerHTML = `
      <div class="section-head"><h2>Alles gefunden!</h2><span class="meta">${state.level}</span></div>
      <div class="quiz-summary">
        <div class="big-num">${state.matchPairsCount}</div>
        <div class="label">Paare gefunden</div>
        <button class="flash-btn primary" id="matchRestart">Neues Spiel</button>
      </div>
    `;
    document.getElementById('matchRestart').addEventListener('click', () => {
      initMatch();
      renderMatch();
    });
    return;
  }

  let html = `
    <div class="section-head">
      <h2>Match</h2>
      <span class="meta">${state.level} · Paare verbinden</span>
    </div>
    <div class="match-stage">
      <div class="match-header">Tippe ein deutsches Wort und seine Übersetzung · Pair the German word with its translation</div>
      <div class="match-grid">
  `;
  state.matchTiles.forEach(t => {
    const cls = 'match-tile ' + t.type + (t.matched ? ' matched' : '') + (state.matchSelected === t.key ? ' selected' : '');
    html += `<button class="${cls}" data-key="${t.key}" ${t.matched ? 'disabled' : ''}>
      ${t.type === 'de' && t.art && (t.art === 'der' || t.art === 'die' || t.art === 'das') ? `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray);margin-right:8px">${t.art}</span>` : ''}
      ${escapeHtml(t.text)}
    </button>`;
  });
  html += `</div></div>`;
  document.getElementById('main').innerHTML = html;

  document.querySelectorAll('.match-tile').forEach(el => {
    el.addEventListener('click', () => {
      const key = parseInt(el.dataset.key);
      const tile = state.matchTiles.find(t => t.key === key);
      if (!tile || tile.matched) return;

      if (state.matchSelected === null) {
        state.matchSelected = key;
        renderMatch();
        return;
      }
      if (state.matchSelected === key) {
        state.matchSelected = null;
        renderMatch();
        return;
      }
      const first = state.matchTiles.find(t => t.key === state.matchSelected);
      if (first.type !== tile.type && first.id === tile.id) {
        // match!
        first.matched = true;
        tile.matched = true;
        state.matchSelected = null;
        state.matchPairsCount++;
        renderMatch();
      } else {
        // wrong - shake
        const prev = state.matchSelected;
        state.matchSelected = null;
        renderMatch();
        const el1 = document.querySelector(`.match-tile[data-key="${prev}"]`);
        const el2 = document.querySelector(`.match-tile[data-key="${key}"]`);
        if (el1) el1.classList.add('wrong-shake');
        if (el2) el2.classList.add('wrong-shake');
        setTimeout(() => {
          if (el1) el1.classList.remove('wrong-shake');
          if (el2) el2.classList.remove('wrong-shake');
        }, 350);
      }
    });
  });
}

/* =========================================================================
   GRAMMATIK RENDERING
   ========================================================================= */
function caseTableDefinite() {
  const rows = [
    ["Nominativ", "der", "die", "das", "die", false, "subject — Wer/Was?"],
    ["Akkusativ", "den", "die", "das", "die", false, "direct object — Wen?"],
    ["Dativ", "dem", "der", "dem", "den +n", true, "indirect object — Wem?"]
  ];
  let h = `<div class="gram-table-wrap"><table class="gram"><thead><tr>
    <th>Kasus</th><th class="col-m">maskulin</th><th class="col-f">feminin</th><th class="col-n">neutrum</th><th class="col-pl">Plural</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr class="${r[5] ? 'highlight' : ''}">
      <th>${r[0]}<span class="hint" style="text-transform:none;letter-spacing:0;color:var(--gray);font-weight:400">${r[6]}</span></th>
      <td><span class="form">${r[1]}</span></td>
      <td><span class="form">${r[2]}</span></td>
      <td><span class="form">${r[3]}</span></td>
      <td><span class="form">${r[4]}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function caseTableIndefinite() {
  const rows = [
    ["Nominativ", "ein", "eine", "ein", false],
    ["Akkusativ", "einen", "eine", "ein", false],
    ["Dativ", "einem", "einer", "einem", true]
  ];
  let h = `<div class="gram-table-wrap"><table class="gram"><thead><tr>
    <th>Kasus</th><th class="col-m">maskulin</th><th class="col-f">feminin</th><th class="col-n">neutrum</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr class="${r[4] ? 'highlight' : ''}">
      <th>${r[0]}</th>
      <td><span class="form">${r[1]}</span></td>
      <td><span class="form">${r[2]}</span></td>
      <td><span class="form">${r[3]}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function pronounTable() {
  const rows = [
    ["ich", "mir", "I → (to) me"],
    ["du", "dir", "you → (to) you"],
    ["er", "ihm", "he → (to) him"],
    ["sie", "ihr", "she → (to) her"],
    ["es", "ihm", "it → (to) it"],
    ["wir", "uns", "we → (to) us"],
    ["ihr", "euch", "you (pl) → (to) you"],
    ["sie", "ihnen", "they → (to) them"],
    ["Sie", "Ihnen", "you (formal) → (to) you"]
  ];
  let h = `<div class="gram-table-wrap"><table class="gram"><thead><tr>
    <th>Nominativ</th><th>Dativ</th><th>English</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr>
      <td><span class="form">${r[0]}</span></td>
      <td class="highlight" style="background:#F7EDD3"><span class="form">${r[1]}</span></td>
      <td style="color:var(--gray);font-size:13px">${r[2]}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function renderGrammarNomDat() {
  return `
    <div class="gram-intro">
      In German, a noun changes its <strong>article</strong> depending on its role in the sentence — this is called a <strong>case (Kasus)</strong>. The <strong>Nominativ</strong> marks the subject (the doer), and the <strong>Dativ</strong> marks the indirect object (the receiver — "to/for whom"). Akkusativ is shown too for contrast.
    </div>

    <div class="gram-block">
      <h3>Bestimmter Artikel</h3>
      <div class="sub">Definite article — "the"</div>
      ${caseTableDefinite()}
      <div class="gram-note"><strong>Dativ-Plural rule:</strong> in the dative plural, the article becomes <em>den</em> and the noun adds <strong>-n</strong> (if it doesn't already end in one): die Kinder → mit <em>den Kinder<strong>n</strong></em>.</div>
    </div>

    <div class="gram-block">
      <h3>Unbestimmter Artikel</h3>
      <div class="sub">Indefinite article — "a / an"</div>
      ${caseTableIndefinite()}
      <div class="gram-note">The same endings apply to <strong>kein-</strong> and all possessives (<em>mein, dein, sein, ihr…</em>): <em>mit mein<strong>em</strong> Bruder</em>, <em>aus ein<strong>er</strong> Stadt</em>.</div>
    </div>

    <div class="gram-block">
      <h3>Personalpronomen</h3>
      <div class="sub">Personal pronouns: Nominativ → Dativ</div>

      <div class="sub">The same noun in different cases</div>
      <div class="gram-list">
        <div class="gram-item">
          <div class="head"><span class="word">Der Mann</span><span class="gloss">Nominativ</span></div>
          <div class="ex"><b>Der Mann</b> liest. <span class="tr">The man reads. (he is the subject)</span></div>
        </div>
        <div class="gram-item">
          <div class="head"><span class="word">dem Mann</span><span class="gloss">Dativ</span></div>

        </div>
        <div class="gram-item">

function renderGrammarDativ() {
  let prep = `<div class="gram-list">`;
  DAT_PREP.forEach(p => {
    prep += `<div class="gram-item">
      <div class="head"><span class="word">${p.w}</span><span class="gloss">${p.g}</span></div>
      <div class="ex">${p.ex} <span class="tr">${p.tr}</span></div>
    </div>`;
  });
  prep += `</div>`;

  let verb = `<div class="gram-list">`;
  DAT_VERB.forEach(v => {
    verb += `<div class="gram-item">
      <div class="head"><span class="word">${v.w}</span><span class="gloss">${v.g}</span></div>
      <div class="ex">${v.ex} <span class="tr">${v.tr}</span></div>
    </div>`;
  });
  verb += `</div>`;

  return `
    <div class="gram-intro">
      Two things reliably trigger the <strong>Dativ</strong>: certain <strong>prepositions</strong> (always) and certain <strong>verbs</strong> (their object goes in the dative). Memorize them as fixed sets.
    </div>

    <div class="gram-block">
      <h3>Dativ-Präpositionen</h3>
      <div class="sub">These 9 prepositions always take the dative</div>
      ${prep}
      <div class="gram-note"><strong>Rhythm trick:</strong> say them as a chant — <em>"aus, außer, bei, mit, nach, seit, von, zu"</em> (plus gegenüber). <strong>Contractions:</strong> bei+dem = <em>beim</em>, von+dem = <em>vom</em>, zu+dem = <em>zum</em>, zu+der = <em>zur</em>.</div>
    </div>

    <div class="gram-block">
      <h3>Dativ-Verben</h3>
      <div class="sub">Their object takes the dative, not the accusative</div>
      ${verb}
      <div class="gram-note"><strong>Watch out:</strong> <em>gefallen</em> and <em>schmecken</em> work "backwards" vs. English. The thing liked is the <em>subject</em>, and the person is the <em>dative object</em>: "Der Kuchen schmeckt mir" = literally "the cake tastes good <em>to me</em>".</div>
    </div>
  `;
}

function renderGrammarIrregular() {
  let h = `
    <div class="gram-intro">
      <strong>Strong verbs</strong> change their stem vowel in the past instead of adding <em>-te</em>. Learn each in four parts: the <strong>infinitive</strong>, the <strong>3rd-person present</strong> (often vowel-changing), the <strong>Präteritum</strong> (written past), and the <strong>Partizip II</strong> (used with <em>haben/sein</em> for the spoken perfect). The colour shows the auxiliary.
    </div>
    <div class="gram-table-wrap"><table class="gram"><thead><tr>
      <th>Infinitiv</th><th>Präsens (er/sie/es)</th><th>Präteritum</th><th>Partizip II</th><th>English</th>
    </tr></thead><tbody>`;
  IRREG.forEach(v => {
    const auxClass = v[4] === 's' ? 'aux-sein' : 'aux-haben';
    const auxWord = v[4] === 's' ? 'ist' : 'hat';
    h += `<tr>
      <td class="de-cell">${v[0]}</td>
      <td><span class="form">${v[1]}</span></td>
      <td><span class="form">${v[2]}</span></td>
      <td class="${auxClass}">${auxWord} ${v[3]}</td>
      <td style="color:var(--gray);font-size:13px">${v[5]}</td>
    </tr>`;
  });
  h += `</tbody></table></div>
    <div class="legend">
      <span><span class="dot haben"></span> haben (most verbs)</span>
      <span><span class="dot sein"></span> sein (movement / change of state)</span>
    </div>
    <div class="gram-note"><strong>Patterns help:</strong> many follow predictable vowel shifts — e→i/ie in the present (geben→gibt, sehen→sieht), and i→a→u across the parts (finden, fand, gefunden; trinken, trank, getrunken). The last four (<em>wissen, denken, bringen, kennen</em>) are <strong>mixed verbs</strong>: vowel change + regular <em>-te</em>/<em>-t</em> endings.</div>
  `;
  return h;
}

function newAbcQuestion() {
  const target = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
  const opts = [target];
  while (opts.length < 3) {
    const c = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
    if (!opts.includes(c)) opts.push(c);
  }
  shuffle(opts);
  state.abcQ = { letter: target.letter, say: target.say, word: target.word, wordEn: target.wordEn,
                 options: opts, answer: opts.indexOf(target) };
  state.abcAnswered = false;
  state.abcSelected = null;
}

      <div class="hoeren-feedback ${correct ? 'right' : 'wrong'}">${correct ? '✓ Richtig!' : '✗ Leider falsch — es war ' + n}</div>
      <div class="hoeren-transcript"><span class="tag">Lösung</span>
        <div class="hoeren-line"><span class="spk">${n}</span> = ${escapeHtml(germanNumber(n))} ${speakerBtnHTML()}</div>
      </div>
      <div class="shadow-controls" style="margin-top:18px"><button class="flash-btn primary" id="zahlNext">Weiter →</button></div>
    `;

    document.getElementById('zahlNext').addEventListener('click', () => {
      if (SPEECH_OK) window.speechSynthesis.cancel();
      newZahlQuestion(); renderZahlDrill();
    });
  }
  checkBtn.addEventListener('click', doCheck);
  if (input) input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { state.zahlAnswered ? null : doCheck(); } });
}

function renderZahlen() {
  if (state.category === '__drill__') renderZahlDrill();
