/* =========================================================================
   HÖREN RENDERING — listening comprehension exercise
   ========================================================================= */
// Plays a multi-line script as a sequence of utterances. Two speakers get a
// light pitch difference so a dialogue feels like two people.
function playHoeren(item, btnEl) {
  if (!SPEECH_OK) return;
  try {
    window.speechSynthesis.cancel();
    const lines = item.script;
    if (btnEl) btnEl.classList.add('speaking');
    lines.forEach((line, i) => {
      const u = new SpeechSynthesisUtterance(line.de);
      u.lang = 'de-DE';
      if (deVoice) u.voice = deVoice;
      u.rate = 0.82;
      u.pitch = line.spk === 'B' ? 0.8 : (line.spk === 'A' ? 1.08 : 1.0);
      if (i === lines.length - 1 && btnEl) {
        u.onend = u.onerror = () => btnEl.classList.remove('speaking');
      }
      window.speechSynthesis.speak(u);
    });
  } catch (e) { /* silently ignore */ }
}

function hoerenPlayBtnHTML(label) {
  return `<button class="shadow-listen" id="hoerenPlay">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 8a5 5 0 0 1 0 8"></path><path d="M17.7 5a9 9 0 0 1 0 14"></path>
      <path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8 .8 0 0 1 1.5 .5v14a.8 .8 0 0 1 -1.5 .5l-3.5 -4.5"></path>
    </svg>
    ${label}
  </button>`;
}

function initHoerenDeck() {
  let items;
  if (state.category === '__all__' || !state.category) items = HOEREN.slice();
  else { const t = HOEREN_TEILE.find(x => x.key === state.category); items = t ? HOEREN.filter(h => h.teil === t.n) : HOEREN.slice(); }
  state.hoerenDeck = items;
  state.hoerenIdx = 0;
  state.hoerenScore = 0;
  state.hoerenAnswered = false;
  state.hoerenSelected = null;
}

function renderHoeren() {
  if (!state.hoerenDeck.length) initHoerenDeck();
  const deck = state.hoerenDeck;
  const main = document.getElementById('main');

  // completion summary
  if (state.hoerenIdx >= deck.length) {
    main.innerHTML = `

      </div>
    `;
    document.getElementById('hoerenRestart').addEventListener('click', () => {
      initHoerenDeck(); renderHoeren();
    });

  }

  const item = deck[state.hoerenIdx];
  const replayNote = item.replays === 1 ? 'Im Test: 1× hören' : 'Im Test: 2× hören';
  const isTF = item.format === 'tf';

  // build options markup
  let optsHTML = '';
  if (isTF) {

  } else {

    ).join('');

  const questionBlock = isTF
    ? `<div class="hoeren-q">Richtig oder falsch?</div>
       <div class="hoeren-q-en" style="margin-bottom:10px">true or false?</div>
       <div class="hoeren-q" style="font-size:17px">„${escapeHtml(item.statement)}"</div>

    </div>
    <div class="hoeren-stage">
      <div class="hoeren-card">
        <div class="hoeren-top">
          <span>Aufgabe ${state.hoerenIdx + 1} / ${deck.length}</span>

        </div>

}

  if (!state.shadowRevealed) {

    btn.style.marginTop = '4px';

    btn.addEventListener('click', showReveal);
    revealArea.appendChild(btn);

/* =========================================================================
   VERBEN RENDERING — full conjugation tables + drill
   ========================================================================= */
function renderVerbTable() {
  // default to first verb if none / invalid selected
  let v = VERBS.find(x => x.inf === state.category);
  if (!v) { v = VERBS[0]; state.category = v.inf; }

  const all = conjugateAll(v);
  const auxName = v.aux === 's' ? 'sein' : 'haben';

  let blocks = '';
  TENSES.forEach(tense => {
    const forms = all[tense];
    let rows = '';
    forms.forEach((f, i) => {
      rows += `<div class="conj-row ${i % 2 ? 'alt' : ''}">
        <span class="pron">${escapeHtml(PRONOUNS[i])}</span>
        <span class="form">${escapeHtml(f)}</span>
      </div>`;
    });
    // speak the full tense as a short phrase list (ich…, du…) — concatenated with pauses
    const spoken = forms.map((f, i) => PRONOUNS[i].split('/')[0] + ' ' + f).join(', ');
    blocks += `<div class="conj-block" data-spoken="${escapeHtml(spoken)}">
      <div class="cb-head"><span>${escapeHtml(tense)}</span>${speakerBtnHTML()}</div>
      ${rows}
    </div>`;
  });

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>Konjugation</h2>
      <span class="meta">Verben · ${VERBS.length} Verben</span>
    </div>
    <div class="verb-head-card">
      <span class="vh-inf">${escapeHtml(v.inf)}</span>
      ${speakerBtnHTML('lg')}
      <span class="vh-en">${escapeHtml(v.en)}</span>
      <span class="verb-tag ${v.cls}">${VERB_CLASS_LABEL[v.cls]}</span>
      <span class="verb-aux">Perfekt mit <b>${auxName}</b></span>
      <span class="verb-aux">Partizip II: <span class="verb-pp">${escapeHtml(v.pp)}</span></span>
    </div>
    <div class="conj-grid">${blocks}</div>
  `;

  // wire the header speaker (reads infinitive)
  const headCard = document.querySelector('.verb-head-card');
  wireSpeaker(headCard, v.inf);
  // wire each tense block speaker
  document.querySelectorAll('.conj-block').forEach(block => {
    wireSpeaker(block, block.dataset.spoken);
  });
}

function newDrillQuestion() {
  const v = VERBS[Math.floor(Math.random() * VERBS.length)];
  const tense = TENSES[Math.floor(Math.random() * TENSES.length)];
  const personIdx = Math.floor(Math.random() * 6);
  const answer = conjFormFor(v, tense, personIdx);
  return { v, tense, personIdx, answer };
}

function checkConjugation(input, answer) {
  const norm = s => normalizeAnswer(s).replace(/ß/g, 'ss');
  const g = norm(input);
  const a = norm(answer);
  if (!g) return 'no';
  if (g === a) return 'ok';
  // forgiving: ignore a leading pronoun the user might prepend (e.g. "du fährst")
  const gStripped = g.replace(/^(ich|du|er|sie|es|wir|ihr)\s+/, '');
  if (gStripped === a) return 'ok';
  // small typo tolerance on single-word answers
  if (!a.includes(' ') && a.length >= 4 && editDistance(gStripped, a) <= 1) return 'partly';
  return 'no';
}

function renderVerbDrill() {
  if (!state.drillQ) state.drillQ = newDrillQuestion();
  const { v, tense, personIdx, answer } = state.drillQ;
  const pron = PRONOUNS[personIdx];

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>Konjugieren üben</h2>
      <span class="meta">Verben · Fill in the blank</span>
    </div>
    <div class="drill-stage">
      <div class="drill-card">
        <div class="drill-header">
          <span>Aufgabe ${state.drillCount + 1}</span>
          <span class="sc">Punkte: ${state.drillScore} / ${state.drillCount}</span>
        </div>
        <div class="drill-task">Konjugiere das Verb</div>
        <div class="drill-cue">
          <span class="drill-verb">${escapeHtml(v.inf)}</span>
          <span class="drill-verb-en">${escapeHtml(v.en)}</span>
        </div>
        <div class="drill-spec">
          <span class="chip">${escapeHtml(tense)}</span>
          <span class="pron-chip">${escapeHtml(pron)}</span>
          <span style="color:var(--gray)"> → ?</span>
        </div>
        <div class="drill-input-row">
          <input class="drill-input" id="drillInput" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="…" />
          ${speakerBtnHTML('lg')}
        </div>
        <div id="drillFeedback"></div>
      </div>
    </div>
  `;

  const input = document.getElementById('drillInput');
  const feedback = document.getElementById('drillFeedback');
  wireSpeaker(document.querySelector('.drill-input-row'), answer);

  function submit() {
    if (state.drillAnswered) { advance(); return; }
    const verdict = checkConjugation(input.value, answer);
    state.drillAnswered = true;
    state.drillCount++;
    const correct = verdict === 'ok';
    if (correct) state.drillScore++;

    input.disabled = true;
    input.classList.add(verdict === 'ok' ? 'correct' : verdict === 'partly' ? 'close' : 'wrong');

    let vt, vc;
    if (verdict === 'ok') { vt = 'Richtig! ✓'; vc = 'ok'; }
    else if (verdict === 'partly') { vt = 'Fast — kleiner Tippfehler'; vc = 'partly'; }
    else { vt = 'Nicht ganz ✗'; vc = 'no'; }

    // full row for context
    const allForms = conjugateAll(v)[tense];
    const fullRow = PRONOUNS.map((p, i) =>
      `<b>${escapeHtml(p.split('/')[0])}</b> ${escapeHtml(allForms[i])}`).join(' · ');

    feedback.innerHTML = `
      <div class="drill-feedback">
        <div class="drill-verdict ${vc}">${vt}</div>
        <div class="drill-answer">${escapeHtml(pron)}: <span class="ans">${escapeHtml(answer)}</span></div>
        <div class="drill-fullrow">${tense}: ${fullRow}</div>
        <div style="margin-top:16px"><button class="flash-btn primary" id="drillNext">Weiter →</button></div>
      </div>
    `;
    document.getElementById('drillNext').addEventListener('click', advance);
  }

  function advance() {
    state.drillQ = newDrillQuestion();
    state.drillAnswered = false;
    renderVerbDrill();
  }

  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
  input.focus();
}

function renderVerben() {
  if (state.category === '__drill__') renderVerbDrill();
  else renderVerbTable();
}

function renderGrammar() {
  if (!GRAMMAR_ORDER.includes(state.category)) state.category = GRAMMAR_ORDER[0];
  let body = '';
  if (state.category === "Nominativ & Dativ") body = renderGrammarNomDat();
  else if (state.category === "Dativ: Präpositionen & Verben") body = renderGrammarDativ();
  else if (state.category === "Unregelmäßige Verben") body = renderGrammarIrregular();

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>${escapeHtml(state.category)}</h2>
      <span class="meta">Grammatik · Reference</span>
    </div>
    ${body}
  `;
}

/* =========================================================================
   TEXTE RENDERING
   ========================================================================= */
function renderTexte() {
  const text = TEXTS.find(t => t.id === state.category) || TEXTS[0];
  state.category = text.id;

  let paras = '';
  text.paras.forEach((p, i) => {
    paras += `<p data-para="${i}">${escapeHtml(p.de)} <span class="vw-speak">${speakerBtnHTML()}</span>
      <span class="trans">${escapeHtml(p.en)}<span class="pt-line">${escapeHtml(p.pt)}</span></span>
    </p>`;
  });

  let gloss = '';
  text.gloss.forEach((g, i) => {
    gloss += `<div class="gloss-row" data-gloss="${i}">
      <div class="g-de" style="display:flex;align-items:center;gap:8px">${escapeHtml(g[0])} ${speakerBtnHTML()}</div>
      <div class="g-en">${escapeHtml(g[1])}</div>
      <div class="g-pt">${escapeHtml(g[2])}</div>
    </div>`;
  });

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>${escapeHtml(text.title)}</h2>
      <span class="meta">Lesetext · Reading</span>
    </div>
    <div class="text-stage">
      <div class="text-meta-bar">
        <span class="text-level-badge">${escapeHtml(text.level)}</span>
        <button class="text-toggle-btn" id="transToggle">Übersetzung zeigen</button>
        ${SPEECH_OK ? `<button class="text-toggle-btn" id="readAll">▶ Ganzen Text vorlesen</button>` : ''}
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray)">Toggle EN + PT · 🔊 to listen</span>
      </div>
      <div class="text-body" id="textBody">
        ${paras}
      </div>
      <div class="text-glossary">
        <div class="gloss-head">Wortschatz · Glossary</div>
        <div class="gloss-grid">${gloss}</div>
      </div>
    </div>
  `;

  const toggle = document.getElementById('transToggle');
  const body = document.getElementById('textBody');
  toggle.addEventListener('click', () => {
    body.classList.toggle('show-trans');
    const on = body.classList.contains('show-trans');
    toggle.classList.toggle('on', on);
    toggle.textContent = on ? 'Übersetzung verbergen' : 'Übersetzung zeigen';
  });

  // Per-paragraph speakers
  body.querySelectorAll('p[data-para]').forEach(p => {
    const idx = parseInt(p.dataset.para);
    wireSpeaker(p, text.paras[idx].de);
  });
  // Glossary speakers
  document.querySelectorAll('.gloss-row[data-gloss]').forEach(row => {
    const idx = parseInt(row.dataset.gloss);
    // strip parenthetical grammar notes like "(+ Dativ)" for cleaner TTS
    wireSpeaker(row, text.gloss[idx][0].replace(/\s*\(.*?\)\s*/g, ' ').trim());
  });
  // Read whole text (paragraph by paragraph)
  const readAll = document.getElementById('readAll');
  if (readAll) {
    readAll.addEventListener('click', () => {
      if (!SPEECH_OK) return;
      window.speechSynthesis.cancel();
      text.paras.forEach(p => {
        const u = new SpeechSynthesisUtterance(p.de);
        u.lang = 'de-DE';
        if (deVoice) u.voice = deVoice;
        u.rate = 0.78;
        window.speechSynthesis.speak(u);
      });
    });
  }
}

/* =========================================================================
   ROUTER
   ========================================================================= */
function renderMain() {
  const modeBar = document.getElementById('modeBar');

  // Grammatik & Texte are study sections — hide the vocab mode bar
  if (state.level === 'Grammatik') {
    modeBar.style.display = 'none';
    renderGrammar();
    return;
  }
  if (state.level === 'Texte') {
    modeBar.style.display = 'none';
    renderTexte();
    return;
  }
  if (state.level === 'Verben') {
    modeBar.style.display = 'none';
    renderVerben();
    return;
  }
  if (state.level === 'Sprechen') {
    modeBar.style.display = 'none';
    renderSprechen();
    return;
  }
  if (state.level === 'Hören') {
    modeBar.style.display = 'none';
    renderHoeren();
    return;
  }
  if (state.level === 'ABC') {
    modeBar.style.display = 'none';
    renderAlphabet();
    return;
  }
  if (state.level === 'Zahlen') {
    modeBar.style.display = 'none';
    renderZahlen();
    return;
  }

  modeBar.style.display = '';
  if (state.mode === 'browse') {
    renderBrowse();
  } else if (state.mode === 'flash') {
    initFlashDeck();
    renderFlash();
  } else if (state.mode === 'write') {
    initWriteDeck();
    renderWrite();
  } else if (state.mode === 'quiz') {
    initQuizDeck();
    currentQuizQ = null;
    renderQuiz();
  } else if (state.mode === 'match') {
    initMatch();
    renderMatch();
  }
}

/* =========================================================================
   INIT
   ========================================================================= */
document.querySelectorAll('#levelToggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (SPEECH_OK) window.speechSynthesis.cancel();
    document.querySelectorAll('#levelToggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.level = btn.dataset.level;
    // Set a sensible default selection for the section
    if (state.level === 'Grammatik') state.category = GRAMMAR_ORDER[0];
    else if (state.level === 'Texte') state.category = TEXTS[0].id;
    else if (state.level === 'Verben') { state.category = VERBS[0].inf; state.drillQ = null; state.drillScore = 0; state.drillCount = 0; state.drillAnswered = false; }
    else if (state.level === 'Sprechen') { state.category = REDE_ORDER[0]; state.shadowDeck = []; state.shadowIdx = 0; state.shadowRevealed = false; state.shadowPeeked = false; }
    else if (state.level === 'Hören') { state.category = '__all__'; initHoerenDeck(); }
    else if (state.level === 'ABC') { state.category = 'browse'; state.abcQ = null; state.abcScore = 0; state.abcCount = 0; state.abcAnswered = false; }
    else if (state.level === 'Zahlen') { state.category = 'browse'; state.zahlQ = null; state.zahlScore = 0; state.zahlCount = 0; state.zahlAnswered = false; }
    else state.category = 'all';
    renderSidebar();
    renderMain();
  });
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (SPEECH_OK) window.speechSynthesis.cancel();
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    renderMain();
  });
});

document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value;
  if ((state.level === 'A1' || state.level === 'A2' || state.level === 'B1' || state.level === 'Alltag') && state.mode === 'browse') {
    renderBrowse();
  }
});

renderSidebar();
renderMain();
</script>
</body>
</html>
