<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Lernen — A1 & A2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F2EBDC;
    --cream-dark: #E8DFCB;
    --ink: #1A1612;
    --ink-soft: #3C342B;
    --paper: #FBF7EE;
    --red: #C8362A;
    --red-soft: #E5A89F;
    --blue: #2B4A7A;
    --blue-soft: #A6BCDA;
    --green: #4F6B3A;
    --green-soft: #B5C9A0;
    --mustard: #C49B3E;
    --gray: #6E665C;
    --gray-soft: #C9C1B3;
    --shadow: 0 2px 0 var(--ink);
    --shadow-deep: 4px 4px 0 var(--ink);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(26,22,18,0.06) 1px, transparent 0);
    background-size: 24px 24px;
  }

  /* ============ HEADER ============ */
  header {
    border-bottom: 2px solid var(--ink);
    background: var(--paper);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .brand-mark {
    display: inline-block;
    width: 32px;
    height: 32px;
    background: var(--red);
    border: 2px solid var(--ink);
    transform: rotate(-3deg);
    position: relative;
    flex-shrink: 0;
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    inset: 4px;
    background: var(--ink);
    clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%, 0 66%, 100% 66%, 100% 100%, 0 100%);
  }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .brand h1 .accent { color: var(--red); font-style: italic; }
  .brand .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-left: 8px;
  }

  .header-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .level-toggle {
    display: flex;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: var(--shadow);
  }
  .level-toggle button {
    background: transparent;
    border: none;
    padding: 8px 20px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink);
    border-right: 2px solid var(--ink);
    transition: background 0.15s;
  }
  .level-toggle button:last-child { border-right: none; }
  .level-toggle button.active {
    background: var(--ink);
    color: var(--cream);
  }
  .level-toggle button:hover:not(.active) { background: var(--cream-dark); }

  .search-box {
    border: 2px solid var(--ink);
    background: var(--paper);
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 200px;
    box-shadow: var(--shadow);
    color: var(--ink);
  }
  .search-box:focus {
    outline: none;
    background: var(--paper);
  }
  .search-box::placeholder { color: var(--gray); }

  /* ============ MODE TABS ============ */
  .mode-bar {
    border-bottom: 2px solid var(--ink);
    background: var(--cream-dark);
    padding: 0 32px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .mode-tab {
    background: transparent;
    border: none;
    border-right: 2px solid var(--ink);
    padding: 14px 24px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .mode-tab:first-child { border-left: 2px solid var(--ink); }
  .mode-tab .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 1px 6px;
  }
  .mode-tab.active {
    background: var(--paper);
    color: var(--ink);
    border-bottom: 2px solid var(--paper);
    margin-bottom: -2px;
    position: relative;
  }
  .mode-tab.active::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    height: 4px;
    background: var(--red);
  }
  .mode-tab:hover:not(.active) { background: var(--cream); }

  /* ============ MAIN LAYOUT ============ */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 140px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 2px solid var(--ink);
    background: var(--paper);
    padding: 24px 0;
    overflow-y: auto;
  }
  .sidebar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 0 24px 12px;
    border-bottom: 1px solid var(--gray-soft);
    margin-bottom: 8px;
  }
  .cat-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cat-btn:hover { background: var(--cream); }
  .cat-btn.active {
    background: var(--cream-dark);
    border-left-color: var(--red);
    font-weight: 700;
  }
  .cat-btn .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
  }
  .cat-btn.all { font-weight: 700; border-bottom: 1px dashed var(--gray-soft); }

  /* MAIN */
  main {
    padding: 32px;
    overflow-y: auto;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-head h2 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .section-head .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ============ BROWSE MODE ============ */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .word-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    position: relative;
  }
  .word-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: var(--shadow-deep);
  }
  .word-card .article {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border: 1.5px solid;
    margin-bottom: 8px;
  }
  .article-der { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }
  .article-die { color: var(--red); border-color: var(--red); background: var(--red-soft); }
  .article-das { color: var(--green); border-color: var(--green); background: var(--green-soft); }
  .article-pl { color: var(--gray); border-color: var(--gray); background: var(--gray-soft); }
  .article-v { color: var(--mustard); border-color: var(--mustard); background: #F2DDAE; }
  .article-adj { color: var(--ink); border-color: var(--ink); background: var(--cream-dark); }

  .word-card .de {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .word-card .translations {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .word-card .translations .lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }
  .word-card .example {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--gray-soft);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    display: none;
  }
  .word-card.expanded .example { display: block; }
  .word-card .example .ex-trans { display: block; font-style: normal; color: var(--gray); font-size: 12px; margin-top: 4px; }

  /* ============ FLASHCARD MODE ============ */
  .flash-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 20px 0;
  }
  .flash-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .flash-progress .bar {
    width: 200px;
    height: 6px;
    background: var(--cream-dark);
    border: 1.5px solid var(--ink);
    position: relative;
    overflow: hidden;
  }
  .flash-progress .bar-fill {
    height: 100%;
    background: var(--red);
    transition: width 0.3s;
  }

  .flashcard {
    width: 100%;
    max-width: 520px;
    aspect-ratio: 3/2;
    perspective: 1200px;
    cursor: pointer;
  }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flash-side {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: var(--shadow-deep);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px;
    text-align: center;
  }
  .flash-side.back { transform: rotateY(180deg); }
  .flash-side .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 14px;
  }
  .flash-side .article {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border: 1.5px solid;
    margin-bottom: 12px;
  }
  .flash-side .main-word {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 44px;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .flash-side .secondary {
    font-size: 17px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .flash-side .ex {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--gray-soft);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 90%;
  }
  .flash-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  .flash-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .flash-btn {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 10px 22px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.1s;
    color: var(--ink);
  }
  .flash-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
  .flash-btn:active { transform: translate(0, 0); box-shadow: var(--shadow); }
  .flash-btn.primary { background: var(--ink); color: var(--cream); }
  .flash-btn.know { background: var(--green-soft); }
  .flash-btn.dont { background: var(--red-soft); }

  /* ============ QUIZ MODE ============ */
  .quiz-stage {
    max-width: 640px;
    margin: 0 auto;
  }
  .quiz-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 32px;
    box-shadow: var(--shadow-deep);
  }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--gray-soft);
  }
  .quiz-score { color: var(--red); font-weight: 600; }

  .quiz-prompt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .quiz-word {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 42px;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 28px;
  }
  .quiz-word .article-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    vertical-align: middle;
    padding: 3px 8px;
    border: 1.5px solid;
    margin-right: 10px;
    transform: translateY(-6px);
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .quiz-option {
    background: var(--cream);
    border: 2px solid var(--ink);
    padding: 14px 18px;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.1s;
    color: var(--ink);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quiz-option:hover:not(:disabled) {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
    background: var(--paper);
  }
  .quiz-option .key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    border: 1px solid var(--gray);
    padding: 1px 5px;
    flex-shrink: 0;
  }
  .quiz-option.correct {
    background: var(--green-soft);
    border-color: var(--green);
  }
  .quiz-option.wrong {
    background: var(--red-soft);
    border-color: var(--red);
  }
  .quiz-option:disabled { cursor: default; }

  .quiz-next {
    margin-top: 20px;
    text-align: center;
  }

  .quiz-summary {
    text-align: center;
    padding: 40px 20px;
  }
  .quiz-summary .big-num {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 72px;
    line-height: 1;
    color: var(--red);
    margin-bottom: 8px;
  }
  .quiz-summary .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 24px;
  }

  /* ============ MATCH MODE ============ */
  .match-stage { max-width: 720px; margin: 0 auto; }
  .match-header {
    text-align: center;
    margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .match-tile {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.1s;
    font-size: 15px;
    color: var(--ink);
    box-shadow: var(--shadow);
    min-height: 56px;
    display: flex;
    align-items: center;
  }
  .match-tile.de { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; }
  .match-tile:hover:not(.matched):not(.selected) {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .match-tile.selected {
    background: var(--ink);
    color: var(--cream);
  }
  .match-tile.matched {
    opacity: 0.35;
    cursor: default;
    background: var(--green-soft);
    box-shadow: none;
  }
  .match-tile.wrong-shake { animation: shake 0.3s; }
  @keyframes shake {
    0%, 100% { transform: translate(0,0); }
    25% { transform: translate(-6px,0); }
    75% { transform: translate(6px,0); }
  }

  /* ============ GRAMMATIK ============ */
  .gram-intro {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-left: 6px solid var(--mustard);
    padding: 18px 22px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .gram-intro strong { color: var(--ink); }
  .gram-block { margin-bottom: 36px; }
  .gram-block h3 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .gram-block .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }
  .gram-table-wrap { overflow-x: auto; border: 2px solid var(--ink); box-shadow: var(--shadow); background: var(--paper); }
  table.gram {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 480px;
  }
  table.gram th, table.gram td {
    border: 1px solid var(--gray-soft);
    padding: 10px 14px;
    text-align: left;
  }
  table.gram thead th {
    background: var(--ink);
    color: var(--cream);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-color: var(--ink);
  }
  table.gram thead th.col-m { background: var(--blue); }
  table.gram thead th.col-f { background: var(--red); }
  table.gram thead th.col-n { background: var(--green); }
  table.gram thead th.col-pl { background: var(--gray); }
  table.gram tbody th {
    background: var(--cream-dark);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink);
    white-space: nowrap;
  }
  table.gram tbody tr.highlight th { background: var(--mustard); color: var(--ink); }
  table.gram tbody tr.highlight td { background: #F7EDD3; font-weight: 600; }
  table.gram td .form { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; }
  table.gram td .hint { display: block; font-size: 11px; color: var(--gray); font-style: italic; margin-top: 2px; }
  table.gram td.de-cell { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; }
  table.gram td.aux-sein { color: var(--red); font-weight: 600; }
  table.gram td.aux-haben { color: var(--blue); font-weight: 600; }

  .gram-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 12px; }
  .gram-item {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 12px 16px;
    box-shadow: var(--shadow);
  }
  .gram-item .head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .gram-item .word { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; }
  .gram-item .gloss { font-size: 13px; color: var(--gray); }
  .gram-item .ex { font-size: 13px; font-style: italic; color: var(--ink-soft); margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--gray-soft); }
  .gram-item .ex .tr { display: block; font-style: normal; color: var(--gray); font-size: 12px; margin-top: 2px; }
  .gram-item .ex b { color: var(--mustard); font-style: normal; }
  .gram-note {
    background: var(--cream-dark);
    border: 1.5px dashed var(--gray);
    padding: 12px 16px;

function currentWords() {
  const levelData = VOCAB[state.level];
  let words = [];
  if (state.category === 'all') {
    for (const cat in levelData) {
      levelData[cat].forEach(w => words.push({ ...w, cat }));
    }
  } else if (levelData[state.category]) {
    levelData[state.category].forEach(w => words.push({ ...w, cat: state.category }));
  }
  if (state.search.trim()) {
    const q = state.search.toLowerCase();
    words = words.filter(w =>
      w.de.toLowerCase().includes(q) ||
      w.en.toLowerCase().includes(q) ||
      w.pt.toLowerCase().includes(q)
    );
  }
  return words;
}

function articleClass(art) {
  if (!art) return '';
  if (art === 'der') return 'article-der';
  if (art === 'die') return 'article-die';
  if (art === 'das') return 'article-das';
  if (art === 'pl') return 'article-pl';
  if (art === 'v') return 'article-v';
  if (art === 'adj') return 'article-adj';
  return '';
}

function articleLabel(art) {
  if (!art) return '';
  if (art === 'pl') return 'die (pl)';
  if (art === 'v') return 'verb';
  if (art === 'adj') return 'adj.';
  return art;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* =========================================================================
   AUDIO — browser Web Speech API (no files, works offline)
   ========================================================================= */
const SPEECH_OK = typeof window !== 'undefined'
  && 'speechSynthesis' in window
  && typeof SpeechSynthesisUtterance !== 'undefined';
let deVoice = null;

function pickGermanVoice() {
  if (!SPEECH_OK) return;
  const voices = window.speechSynthesis.getVoices() || [];
  // Prefer a de-DE voice; fall back to any German voice
  deVoice = voices.find(v => v.lang === 'de-DE')
        || voices.find(v => /^de(-|_)/i.test(v.lang))
        || voices.find(v => /german|deutsch/i.test(v.name))
        || null;
}
if (SPEECH_OK) {
  pickGermanVoice();
  // Voices often load asynchronously
  window.speechSynthesis.onvoiceschanged = pickGermanVoice;
}

function speakGerman(text, btnEl) {
  if (!SPEECH_OK) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE';
    if (deVoice) u.voice = deVoice;
    u.rate = 0.92;
    u.pitch = 1.0;
    if (btnEl) {
      btnEl.classList.add('speaking');
      u.onend = u.onerror = () => btnEl.classList.remove('speaking');
    }
    window.speechSynthesis.speak(u);
  } catch (e) { /* silently ignore */ }
}

// Strips articles/labels so TTS reads the word cleanly. Keeps der/die/das (useful to hear gender).
function speakablePhrase(w) {
  if (w.art === 'der' || w.art === 'die' || w.art === 'das') return w.art + ' ' + w.de;
  return w.de;
}

function speakerBtnHTML(extraClass) {
  const cls = 'speak-btn' + (extraClass ? ' ' + extraClass : '') + (SPEECH_OK ? '' : ' speak-unavailable');
  // Tabler-style outline volume icon
  return `<button class="${cls}" data-speak aria-label="Anhören" title="Anhören / Listen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 8a5 5 0 0 1 0 8"></path>
      <path d="M17.7 5a9 9 0 0 1 0 14"></path>
      <path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8 .8 0 0 1 1.5 .5v14a.8 .8 0 0 1 -1.5 .5l-3.5 -4.5"></path>
    </svg>
  </button>`;
}

// Wires up every [data-speak] button within a container to speak the given text.
function wireSpeaker(scopeEl, text) {
  if (!scopeEl) return;
  const btn = scopeEl.querySelector('[data-speak]');
  if (btn) {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      speakGerman(text, btn);
    });
  }
}

/* =========================================================================
   SPACED REPETITION (SRS) — lightweight Leitner-style scheduling.
   Persists to localStorage when available; degrades to in-memory otherwise.
   Each word keyed by level::de. Record: { box, due } where box 0..5 and
   due is a "session counter" so due words resurface sooner.
   ========================================================================= */
const SRS_KEY = 'deutsch_srs_v1';
let srsStore = {};
let srsPersist = false;
let srsSessionCounter = 0;

(function initSrsStore() {
  try {
    const raw = window.localStorage.getItem(SRS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      srsStore = parsed.store || {};
      srsSessionCounter = parsed.counter || 0;
    }
    // probe write access
    window.localStorage.setItem(SRS_KEY + '_probe', '1');
    window.localStorage.removeItem(SRS_KEY + '_probe');
    srsPersist = true;
  } catch (e) {
    srsPersist = false; // in-memory only (e.g. sandboxed preview)
  }
})();

function srsSave() {
  if (!srsPersist) return;
  try {
    window.localStorage.setItem(SRS_KEY, JSON.stringify({ store: srsStore, counter: srsSessionCounter }));
  } catch (e) { /* ignore quota / access errors */ }
}

function srsKey(w) { return state.level + '::' + w.de; }

function srsGet(w) {
  return srsStore[srsKey(w)] || { box: 0, due: 0 };
}

// Leitner intervals per box (in "sessions"). Higher box = seen less often.
const SRS_INTERVAL = [0, 1, 2, 4, 7, 12];

function srsUpdate(w, correct) {
  const k = srsKey(w);
  const rec = srsStore[k] || { box: 0, due: 0 };
  if (correct) rec.box = Math.min(5, rec.box + 1);
  else rec.box = Math.max(0, rec.box - 1);
  rec.due = srsSessionCounter + SRS_INTERVAL[rec.box];
  rec.seen = (rec.seen || 0) + 1;
  srsStore[k] = rec;
  srsSave();
}

function srsTier(w) {
  const rec = srsStore[srsKey(w)];
  if (!rec || rec.box === 0) return 'due';
  if (rec.box >= 4) return 'known';
  return 'learning';
}

// Orders a word list so due/weak words come first, then by box ascending,
// with light shuffling inside each tier to avoid identical sessions.
function srsOrder(words) {
  const withMeta = words.map(w => {
    const rec = srsStore[srsKey(w)] || { box: 0, due: 0 };
    const isDue = rec.due <= srsSessionCounter;
    return { w, box: rec.box, isDue, r: Math.random() };
  });
  withMeta.sort((a, b) => {
    if (a.isDue !== b.isDue) return a.isDue ? -1 : 1; // due first
    if (a.box !== b.box) return a.box - b.box;         // weaker first
    return a.r - b.r;                                  // shuffle within tier
  });
  return withMeta.map(m => m.w);
}

function srsCounts(words) {
  let due = 0, learning = 0, known = 0;
  words.forEach(w => {
    const t = srsTier(w);
    if (t === 'due') due++;
    else if (t === 'learning') learning++;
    else known++;
  });
  return { due, learning, known };
}

function srsResetLevel() {
  const prefix = state.level + '::';
  Object.keys(srsStore).forEach(k => { if (k.startsWith(prefix)) delete srsStore[k]; });
  srsSave();
}

// Normalizes a typed answer for forgiving comparison.
function normalizeAnswer(s) {
  return String(s).trim().toLowerCase()
    .replace(/\s+/g, ' ')
    .replace(/[.!?,;:]+$/, '');
}
// Strips a leading article so "Tisch" matches "der Tisch" partially.
function stripArticle(s) {
  return s.replace(/^(der|die|das)\s+/i, '').trim();
}
// Levenshtein distance for "almost correct" feedback.
function editDistance(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + cost);
    }
  }
  return dp[m][n];
}

}

function renderFlash() {

      </div>
    `;
    document.getElementById('flashRestart').addEventListener('click', () => {
      initFlashDeck();
      renderFlash();
    });
    return;
  }

  const w = words[state.flashIdx];
  const pct = ((state.flashIdx) / words.length) * 100;
  const tier = srsTier(w);

  const html = `
    <div class="section-head">

    <div class="flash-stage">
      <div class="flash-progress">
        <span>Karte ${state.flashIdx + 1} / ${words.length}</span>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span>✓ ${state.flashStats.known} · ✗ ${state.flashStats.unknown}</span>
      </div>
      <div class="flashcard ${state.flashFlipped ? 'flipped' : ''}" id="flashcard">
        <div class="flashcard-inner">
          <div class="flash-side front">
            ${state.srsEnabled ? `<span class="flash-srs-tag ${tier}">${tierLabel}</span>` : ''}
            <span class="label">Deutsch</span>
            ${w.art ? `<span class="article ${articleClass(w.art)}">${articleLabel(w.art)}</span>` : ''}
            <div class="main-word">${escapeHtml(w.de)}</div>
            ${speakerBtnHTML('lg')}
            <div class="flash-hint" style="margin-top:18px">Klicken zum Umdrehen</div>
          </div>
          <div class="flash-side back">
            <span class="label">EN · PT</span>
            <div class="main-word" style="font-size:32px">${escapeHtml(w.en)}</div>
            <div class="secondary">${escapeHtml(w.pt)}</div>
            <div class="ex"><em>${escapeHtml(w.ex)}</em><br><span style="font-size:12px;color:var(--gray)">${escapeHtml(w.exTr)}</span></div>
          </div>
        </div>
      </div>
      <div class="flash-controls">
        <button class="flash-btn dont" id="flashDont">Nochmal üben ✗</button>
        <button class="flash-btn" id="flashFlip">${state.flashFlipped ? 'Frage' : 'Antwort'}</button>
        <button class="flash-btn know" id="flashKnow">Gewusst ✓</button>
      </div>
    </div>
  `;
  document.getElementById('main').innerHTML = html;

  const card = document.getElementById('flashcard');
  // speaker button lives on the front face; wire it without flipping the card
  wireSpeaker(card, speakablePhrase(w));
  card.addEventListener('click', (e) => {
    if (e.target.closest('[data-speak]')) return;
    state.flashFlipped = !state.flashFlipped;
    renderFlash();
  });
  document.getElementById('flashFlip').addEventListener('click', (e) => {
    e.stopPropagation();
    state.flashFlipped = !state.flashFlipped;
    renderFlash();
  });
  document.getElementById('flashKnow').addEventListener('click', (e) => {
    e.stopPropagation();
    if (state.srsEnabled) srsUpdate(w, true);
    state.flashStats.known++;
    state.flashIdx++;
    state.flashFlipped = false;
    renderFlash();
  });
  document.getElementById('flashDont').addEventListener('click', (e) => {
    e.stopPropagation();
    if (state.srsEnabled) srsUpdate(w, false);
    state.flashStats.unknown++;
    state.flashIdx++;
    state.flashFlipped = false;
    renderFlash();
  });
  const resetBtn = document.getElementById('srsReset');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      srsResetLevel();
      initFlashDeck();
      renderFlash();
    });
  }
}

/* =========================================================================
   WRITE / SCHREIBEN MODE — active recall: type the German from EN/PT cue
   ========================================================================= */
function initWriteDeck() {
  const words = currentWords();
  state.writeDeck = (state.srsEnabled ? srsOrder(words) : shuffle(words)).slice(0, Math.min(15, words.length));
  state.writeIdx = 0;
  state.writeScore = 0;
  state.writeAnswered = false;
}

function evaluateAnswer(input, w) {
  const guess = normalizeAnswer(input);
  if (!guess) return { verdict: 'no' };

  const target = normalizeAnswer(w.de);
  const targetNoArt = normalizeAnswer(stripArticle(w.de));
  const guessNoArt = normalizeAnswer(stripArticle(input));

  // Exact (with or without article)
  if (guess === target) return { verdict: 'ok', exact: true };
  if (guessNoArt === targetNoArt) {
    // correct word — but did they need an article and miss/wrong it?
    const needsArticle = (w.art === 'der' || w.art === 'die' || w.art === 'das');
    if (needsArticle && guess !== target) {
      return { verdict: 'partly', reason: 'article' };
    }
    return { verdict: 'ok', exact: true };
  }
  // Almost — small typo (edit distance 1 on the no-article form)
  if (targetNoArt.length >= 4 && editDistance(guessNoArt, targetNoArt) <= 1) {
    return { verdict: 'partly', reason: 'typo' };
  }
  return { verdict: 'no' };
}

function renderWrite() {
  if (!state.writeDeck.length) initWriteDeck();
  if (!state.writeDeck.length) {
    document.getElementById('main').innerHTML = `<div class="empty">Keine Wörter zum Üben.</div>`;
    return;
  }

  if (state.writeIdx >= state.writeDeck.length) {
    srsSessionCounter++; srsSave();
    const total = state.writeDeck.length;
    const pct = Math.round((state.writeScore / total) * 100);
    document.getElementById('main').innerHTML = `
      <div class="section-head"><h2>Fertig!</h2><span class="meta">${state.level} · Schreiben</span></div>
      <div class="quiz-summary">
        <div class="big-num">${state.writeScore}/${total}</div>
        <div class="label">${pct}% richtig geschrieben</div>
        <button class="flash-btn primary" id="writeRestart">Nochmal</button>
      </div>
    `;
    document.getElementById('writeRestart').addEventListener('click', () => { initWriteDeck(); renderWrite(); });
    return;
  }

  const w = state.writeDeck[state.writeIdx];
  const needsArticle = (w.art === 'der' || w.art === 'die' || w.art === 'das');

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>Schreiben</h2>
      <span class="meta">${state.level} · Type the German</span>
    </div>
    <div class="write-stage">
      <div class="write-card">
        <div class="write-header">
          <span>Wort ${state.writeIdx + 1} / ${state.writeDeck.length}</span>
          <span class="write-score">Punkte: ${state.writeScore}</span>
        </div>
        <div class="write-prompt-label">Schreibe auf Deutsch</div>
        <div class="write-cue">${escapeHtml(w.en)}</div>
        <div class="write-cue-sub">${escapeHtml(w.pt)}</div>
        ${needsArticle ? `<div class="write-hint-art">Tipp: mit Artikel (der / die / das)</div>` : ''}
        <div class="write-input-row">
          <input class="write-input" id="writeInput" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="…" />
          ${speakerBtnHTML('lg')}
        </div>
        <div id="writeFeedback"></div>
      </div>
    </div>
  `;

  const input = document.getElementById('writeInput');
  const feedback = document.getElementById('writeFeedback');
  // Speaker reads the correct answer (useful after answering, but available anytime)
  wireSpeaker(document.querySelector('.write-input-row'), speakablePhrase(w));

  function submit() {
    if (state.writeAnswered) { advance(); return; }
    const res = evaluateAnswer(input.value, w);
    state.writeAnswered = true;
    const correct = res.verdict === 'ok';
    if (correct) state.writeScore++;
    if (state.srsEnabled) srsUpdate(w, correct);

    input.classList.add(res.verdict === 'ok' ? 'correct' : res.verdict === 'partly' ? 'close' : 'wrong');
    input.disabled = true;

    let verdictText, verdictClass;
    if (res.verdict === 'ok') { verdictText = 'Richtig! ✓'; verdictClass = 'ok'; }
    else if (res.verdict === 'partly' && res.reason === 'article') { verdictText = 'Fast — falscher/fehlender Artikel'; verdictClass = 'partly'; }
    else if (res.verdict === 'partly' && res.reason === 'typo') { verdictText = 'Fast — kleiner Tippfehler'; verdictClass = 'partly'; }
    else { verdictText = 'Nicht ganz ✗'; verdictClass = 'no'; }

    feedback.innerHTML = `
      <div class="write-feedback">
        <div class="write-verdict ${verdictClass}">${verdictText}</div>
        <div class="write-answer">Antwort: <span class="ans-de">${escapeHtml(w.de)}</span></div>
        <div class="write-ex"><em>${escapeHtml(w.ex)}</em><span class="tr">${escapeHtml(w.exTr)}</span></div>
        <div style="margin-top:16px"><button class="flash-btn primary" id="writeNext">Weiter →</button></div>
      </div>
    `;
    document.getElementById('writeNext').addEventListener('click', advance);
  }

  function advance() {
    state.writeIdx++;
    state.writeAnswered = false;
    renderWrite();
  }

  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
  input.focus();
}

/* =========================================================================
   QUIZ MODE
   ========================================================================= */
function initQuizDeck() {
  state.quizDeck = shuffle(currentWords()).slice(0, Math.min(15, currentWords().length));
  state.quizIdx = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  state.quizSelectedOption = null;
  state.quizCorrectOption = null;
}

function buildQuizQuestion(idx) {
  const allWords = currentWords();
  const correct = state.quizDeck[idx];
  const distractors = shuffle(allWords.filter(w => w.de !== correct.de)).slice(0, 3);
  const options = shuffle([correct, ...distractors]);
  return { correct, options };
}

let currentQuizQ = null;

function renderQuiz() {
  if (state.quizDeck.length === 0) initQuizDeck();

  if (state.quizDeck.length === 0) {
    document.getElementById('main').innerHTML = `<div class="empty">Nicht genug Wörter für ein Quiz.</div>`;
    return;
  }

  if (state.quizIdx >= state.quizDeck.length) {
    const total = state.quizDeck.length;
    const pct = Math.round((state.quizScore / total) * 100);
    document.getElementById('main').innerHTML = `
      <div class="section-head"><h2>Quiz beendet</h2><span class="meta">${state.level}</span></div>
      <div class="quiz-summary">
        <div class="big-num">${state.quizScore}/${total}</div>
        <div class="label">${pct}% korrekt</div>
        <button class="flash-btn primary" id="quizRestart">Neues Quiz</button>
      </div>
    `;
    document.getElementById('quizRestart').addEventListener('click', () => {
      initQuizDeck();
      currentQuizQ = null;
      renderQuiz();
    });
    return;
  }

  if (!state.quizAnswered) {
    currentQuizQ = buildQuizQuestion(state.quizIdx);
  }
  const q = currentQuizQ;

  let html = `
    <div class="section-head">
      <h2>Quiz</h2>
      <span class="meta">${state.level} · Multiple Choice</span>
    </div>
    <div class="quiz-stage">
      <div class="quiz-card">
        <div class="quiz-header">
          <span>Frage ${state.quizIdx + 1} / ${state.quizDeck.length}</span>
          <span class="quiz-score">Punkte: ${state.quizScore}</span>
        </div>
        <div class="quiz-prompt">Was bedeutet auf Englisch?</div>
        <div class="quiz-word">
          ${q.correct.art && (q.correct.art === 'der' || q.correct.art === 'die' || q.correct.art === 'das') ? `<span class="article-tag ${articleClass(q.correct.art)}">${q.correct.art}</span>` : ''}
          ${escapeHtml(q.correct.de)}
        </div>
        <div class="quiz-options">
  `;
  q.options.forEach((opt, i) => {
    const letter = ['A','B','C','D'][i];
    let cls = 'quiz-option';
    if (state.quizAnswered) {
      if (opt.de === q.correct.de) cls += ' correct';
      else if (i === state.quizSelectedOption) cls += ' wrong';
    }
    html += `<button class="${cls}" data-i="${i}" ${state.quizAnswered ? 'disabled' : ''}>
      <span class="key">${letter}</span><span>${escapeHtml(opt.en)}</span>
    </button>`;
  });
  html += `
        </div>
        ${state.quizAnswered ? `
          <div class="quiz-next">
            <div style="font-size:14px;color:var(--ink-soft);margin-bottom:12px;font-style:italic">
              ${escapeHtml(q.correct.ex)} <span style="color:var(--gray)">— ${escapeHtml(q.correct.exTr)}</span>
            </div>
            <button class="flash-btn primary" id="quizNext">Weiter →</button>
          </div>
        ` : ''}
      </div>
    </div>
  `;
  document.getElementById('main').innerHTML = html;

  if (!state.quizAnswered) {
    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.i);
        state.quizSelectedOption = i;
        state.quizAnswered = true;
        if (q.options[i].de === q.correct.de) {
          state.quizScore++;
        }
        renderQuiz();
      });
    });
  } else {
    document.getElementById('quizNext').addEventListener('click', () => {
      state.quizIdx++;
      state.quizAnswered = false;
      state.quizSelectedOption = null;
      renderQuiz();
    });
  }
}

/* =========================================================================
   MATCH MODE
   ========================================================================= */
function initMatch() {
  const pool = shuffle(currentWords()).slice(0, 8);
  const deTiles = pool.map(w => ({ id: w.de, type: 'de', text: w.de, art: w.art }));
  const enTiles = pool.map(w => ({ id: w.de, type: 'en', text: w.en }));
  state.matchTiles = shuffle([...deTiles, ...enTiles]).map((t, i) => ({ ...t, key: i, matched: false }));
  state.matchSelected = null;
  state.matchPairsCount = 0;
}

function renderMatch() {
  if (!state.matchTiles.length) initMatch();
  const allMatched = state.matchTiles.every(t => t.matched);

  if (allMatched && state.matchTiles.length) {
    document.getElementById('main').innerHTML = `
      <div class="section-head"><h2>Alles gefunden!</h2><span class="meta">${state.level}</span></div>
      <div class="quiz-summary">
        <div class="big-num">${state.matchPairsCount}</div>
        <div class="label">Paare gefunden</div>
        <button class="flash-btn primary" id="matchRestart">Neues Spiel</button>
      </div>
    `;
    document.getElementById('matchRestart').addEventListener('click', () => {
      initMatch();
      renderMatch();
    });
    return;
  }

  let html = `
    <div class="section-head">
      <h2>Match</h2>
      <span class="meta">${state.level} · Paare verbinden</span>
    </div>
    <div class="match-stage">
      <div class="match-header">Tippe ein deutsches Wort und seine Übersetzung · Pair the German word with its translation</div>
      <div class="match-grid">
  `;
  state.matchTiles.forEach(t => {
    const cls = 'match-tile ' + t.type + (t.matched ? ' matched' : '') + (state.matchSelected === t.key ? ' selected' : '');
    html += `<button class="${cls}" data-key="${t.key}" ${t.matched ? 'disabled' : ''}>
      ${t.type === 'de' && t.art && (t.art === 'der' || t.art === 'die' || t.art === 'das') ? `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray);margin-right:8px">${t.art}</span>` : ''}
      ${escapeHtml(t.text)}
    </button>`;
  });
  html += `</div></div>`;
  document.getElementById('main').innerHTML = html;

  document.querySelectorAll('.match-tile').forEach(el => {
    el.addEventListener('click', () => {
      const key = parseInt(el.dataset.key);
      const tile = state.matchTiles.find(t => t.key === key);
      if (!tile || tile.matched) return;

      if (state.matchSelected === null) {
        state.matchSelected = key;
        renderMatch();
        return;
      }
      if (state.matchSelected === key) {
        state.matchSelected = null;
        renderMatch();
        return;
      }
      const first = state.matchTiles.find(t => t.key === state.matchSelected);
      if (first.type !== tile.type && first.id === tile.id) {
        // match!
        first.matched = true;
        tile.matched = true;
        state.matchSelected = null;
        state.matchPairsCount++;
        renderMatch();
      } else {
        // wrong - shake
        const prev = state.matchSelected;
        state.matchSelected = null;
        renderMatch();
        const el1 = document.querySelector(`.match-tile[data-key="${prev}"]`);
        const el2 = document.querySelector(`.match-tile[data-key="${key}"]`);
        if (el1) el1.classList.add('wrong-shake');
        if (el2) el2.classList.add('wrong-shake');
        setTimeout(() => {
          if (el1) el1.classList.remove('wrong-shake');
          if (el2) el2.classList.remove('wrong-shake');
        }, 350);
      }
    });
  });
}

/* =========================================================================
   GRAMMATIK RENDERING
   ========================================================================= */
function caseTableDefinite() {
  const rows = [
    ["Nominativ", "der", "die", "das", "die", false, "subject — Wer/Was?"],
    ["Akkusativ", "den", "die", "das", "die", false, "direct object — Wen?"],
    ["Dativ", "dem", "der", "dem", "den +n", true, "indirect object — Wem?"]
  ];
  let h = `<div class="gram-table-wrap"><table class="gram"><thead><tr>
    <th>Kasus</th><th class="col-m">maskulin</th><th class="col-f">feminin</th><th class="col-n">neutrum</th><th class="col-pl">Plural</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr class="${r[5] ? 'highlight' : ''}">
      <th>${r[0]}<span class="hint" style="text-transform:none;letter-spacing:0;color:var(--gray);font-weight:400">${r[6]}</span></th>
      <td><span class="form">${r[1]}</span></td>
      <td><span class="form">${r[2]}</span></td>
      <td><span class="form">${r[3]}</span></td>
      <td><span class="form">${r[4]}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function caseTableIndefinite() {
  const rows = [
    ["Nominativ", "ein", "eine", "ein", false],
    ["Akkusativ", "einen", "eine", "ein", false],
    ["Dativ", "einem", "einer", "einem", true]
  ];
  let h = `<div class="gram-table-wrap"><table class="gram"><thead><tr>
    <th>Kasus</th><th class="col-m">maskulin</th><th class="col-f">feminin</th><th class="col-n">neutrum</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr class="${r[4] ? 'highlight' : ''}">
      <th>${r[0]}</th>
      <td><span class="form">${r[1]}</span></td>
      <td><span class="form">${r[2]}</span></td>
      <td><span class="form">${r[3]}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function pronounTable() {
  const rows = [
    ["ich", "mir", "I → (to) me"],
    ["du", "dir", "you → (to) you"],
    ["er", "ihm", "he → (to) him"],
    ["sie", "ihr", "she → (to) her"],
    ["es", "ihm", "it → (to) it"],
    ["wir", "uns", "we → (to) us"],
    ["ihr", "euch", "you (pl) → (to) you"],
    ["sie", "ihnen", "they → (to) them"],
    ["Sie", "Ihnen", "you (formal) → (to) you"]
  ];
  let h = `<div class="gram-table-wrap"><table class="gram"><thead><tr>
    <th>Nominativ</th><th>Dativ</th><th>English</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr>
      <td><span class="form">${r[0]}</span></td>
      <td class="highlight" style="background:#F7EDD3"><span class="form">${r[1]}</span></td>
      <td style="color:var(--gray);font-size:13px">${r[2]}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function renderGrammarNomDat() {
  return `
    <div class="gram-intro">
      In German, a noun changes its <strong>article</strong> depending on its role in the sentence — this is called a <strong>case (Kasus)</strong>. The <strong>Nominativ</strong> marks the subject (the doer), and the <strong>Dativ</strong> marks the indirect object (the receiver — "to/for whom"). Akkusativ is shown too for contrast.
    </div>

    <div class="gram-block">
      <h3>Bestimmter Artikel</h3>
      <div class="sub">Definite article — "the"</div>
      ${caseTableDefinite()}
      <div class="gram-note"><strong>Dativ-Plural rule:</strong> in the dative plural, the article becomes <em>den</em> and the noun adds <strong>-n</strong> (if it doesn't already end in one): die Kinder → mit <em>den Kinder<strong>n</strong></em>.</div>
    </div>

    <div class="gram-block">
      <h3>Unbestimmter Artikel</h3>
      <div class="sub">Indefinite article — "a / an"</div>
      ${caseTableIndefinite()}
      <div class="gram-note">The same endings apply to <strong>kein-</strong> and all possessives (<em>mein, dein, sein, ihr…</em>): <em>mit mein<strong>em</strong> Bruder</em>, <em>aus ein<strong>er</strong> Stadt</em>.</div>
    </div>

    <div class="gram-block">
      <h3>Personalpronomen</h3>
      <div class="sub">Personal pronouns: Nominativ → Dativ</div>
      ${pronounTable()}
    </div>

    <div class="gram-block">
      <h3>Sehen Sie den Unterschied</h3>
      <div class="sub">The same noun in different cases</div>
      <div class="gram-list">
        <div class="gram-item">
          <div class="head"><span class="word">Der Mann</span><span class="gloss">Nominativ</span></div>
          <div class="ex"><b>Der Mann</b> liest. <span class="tr">The man reads. (he is the subject)</span></div>
        </div>
        <div class="gram-item">
          <div class="head"><span class="word">dem Mann</span><span class="gloss">Dativ</span></div>
          <div class="ex">Ich gebe <b>dem Mann</b> ein Buch. <span class="tr">I give the man a book. (he receives it)</span></div>
        </div>
        <div class="gram-item">
          <div class="head"><span class="word">Die Frau</span><span class="gloss">Nominativ</span></div>
          <div class="ex"><b>Die Frau</b> arbeitet. <span class="tr">The woman works.</span></div>
        </div>
        <div class="gram-item">
          <div class="head"><span class="word">der Frau</span><span class="gloss">Dativ</span></div>
          <div class="ex">Ich helfe <b>der Frau</b>. <span class="tr">I help the woman.</span></div>
        </div>
      </div>
    </div>
  `;
}

function renderGrammarDativ() {
  let prep = `<div class="gram-list">`;
  DAT_PREP.forEach(p => {
    prep += `<div class="gram-item">
      <div class="head"><span class="word">${p.w}</span><span class="gloss">${p.g}</span></div>
      <div class="ex">${p.ex} <span class="tr">${p.tr}</span></div>
    </div>`;
  });
  prep += `</div>`;

  let verb = `<div class="gram-list">`;
  DAT_VERB.forEach(v => {
    verb += `<div class="gram-item">
      <div class="head"><span class="word">${v.w}</span><span class="gloss">${v.g}</span></div>
      <div class="ex">${v.ex} <span class="tr">${v.tr}</span></div>
    </div>`;
  });
  verb += `</div>`;

  return `
    <div class="gram-intro">
      Two things reliably trigger the <strong>Dativ</strong>: certain <strong>prepositions</strong> (always) and certain <strong>verbs</strong> (their object goes in the dative). Memorize them as fixed sets.
    </div>

    <div class="gram-block">
      <h3>Dativ-Präpositionen</h3>
      <div class="sub">These 9 prepositions always take the dative</div>
      ${prep}
      <div class="gram-note"><strong>Rhythm trick:</strong> say them as a chant — <em>"aus, außer, bei, mit, nach, seit, von, zu"</em> (plus gegenüber). <strong>Contractions:</strong> bei+dem = <em>beim</em>, von+dem = <em>vom</em>, zu+dem = <em>zum</em>, zu+der = <em>zur</em>.</div>
    </div>

    <div class="gram-block">
      <h3>Dativ-Verben</h3>
      <div class="sub">Their object takes the dative, not the accusative</div>
      ${verb}
      <div class="gram-note"><strong>Watch out:</strong> <em>gefallen</em> and <em>schmecken</em> work "backwards" vs. English. The thing liked is the <em>subject</em>, and the person is the <em>dative object</em>: "Der Kuchen schmeckt mir" = literally "the cake tastes good <em>to me</em>".</div>
    </div>
  `;
}

function renderGrammarIrregular() {
  let h = `
    <div class="gram-intro">
      <strong>Strong verbs</strong> change their stem vowel in the past instead of adding <em>-te</em>. Learn each in four parts: the <strong>infinitive</strong>, the <strong>3rd-person present</strong> (often vowel-changing), the <strong>Präteritum</strong> (written past), and the <strong>Partizip II</strong> (used with <em>haben/sein</em> for the spoken perfect). The colour shows the auxiliary.
    </div>
    <div class="gram-table-wrap"><table class="gram"><thead><tr>
      <th>Infinitiv</th><th>Präsens (er/sie/es)</th><th>Präteritum</th><th>Partizip II</th><th>English</th>
    </tr></thead><tbody>`;
  IRREG.forEach(v => {
    const auxClass = v[4] === 's' ? 'aux-sein' : 'aux-haben';
    const auxWord = v[4] === 's' ? 'ist' : 'hat';
    h += `<tr>
      <td class="de-cell">${v[0]}</td>
      <td><span class="form">${v[1]}</span></td>
      <td><span class="form">${v[2]}</span></td>
      <td class="${auxClass}">${auxWord} ${v[3]}</td>
      <td style="color:var(--gray);font-size:13px">${v[5]}</td>
    </tr>`;
  });
  h += `</tbody></table></div>
    <div class="legend">
      <span><span class="dot haben"></span> haben (most verbs)</span>
      <span><span class="dot sein"></span> sein (movement / change of state)</span>
    </div>
    <div class="gram-note"><strong>Patterns help:</strong> many follow predictable vowel shifts — e→i/ie in the present (geben→gibt, sehen→sieht), and i→a→u across the parts (finden, fand, gefunden; trinken, trank, getrunken). The last four (<em>wissen, denken, bringen, kennen</em>) are <strong>mixed verbs</strong>: vowel change + regular <em>-te</em>/<em>-t</em> endings.</div>
  `;
  return h;
}

function renderGrammar() {
  if (!GRAMMAR_ORDER.includes(state.category)) state.category = GRAMMAR_ORDER[0];
  let body = '';
  if (state.category === "Nominativ & Dativ") body = renderGrammarNomDat();
  else if (state.category === "Dativ: Präpositionen & Verben") body = renderGrammarDativ();
  else if (state.category === "Unregelmäßige Verben") body = renderGrammarIrregular();

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>${escapeHtml(state.category)}</h2>
      <span class="meta">Grammatik · Reference</span>
    </div>
    ${body}
  `;
}

/* =========================================================================
   TEXTE RENDERING
   ========================================================================= */
function renderTexte() {
  const text = TEXTS.find(t => t.id === state.category) || TEXTS[0];
  state.category = text.id;

  let paras = '';
  text.paras.forEach((p, i) => {
    paras += `<p data-para="${i}">${escapeHtml(p.de)} <span class="vw-speak">${speakerBtnHTML()}</span>
      <span class="trans">${escapeHtml(p.en)}<span class="pt-line">${escapeHtml(p.pt)}</span></span>
    </p>`;
  });

  let gloss = '';
  text.gloss.forEach((g, i) => {
    gloss += `<div class="gloss-row" data-gloss="${i}">
      <div class="g-de" style="display:flex;align-items:center;gap:8px">${escapeHtml(g[0])} ${speakerBtnHTML()}</div>
      <div class="g-en">${escapeHtml(g[1])}</div>
      <div class="g-pt">${escapeHtml(g[2])}</div>
    </div>`;
  });

  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <h2>${escapeHtml(text.title)}</h2>
      <span class="meta">Lesetext · Reading</span>
    </div>
    <div class="text-stage">
      <div class="text-meta-bar">
        <span class="text-level-badge">${escapeHtml(text.level)}</span>
        <button class="text-toggle-btn" id="transToggle">Übersetzung zeigen</button>
        ${SPEECH_OK ? `<button class="text-toggle-btn" id="readAll">▶ Ganzen Text vorlesen</button>` : ''}
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray)">Toggle EN + PT · 🔊 to listen</span>
      </div>
      <div class="text-body" id="textBody">
        ${paras}
      </div>
      <div class="text-glossary">
        <div class="gloss-head">Wortschatz · Glossary</div>
        <div class="gloss-grid">${gloss}</div>
      </div>
    </div>
  `;

  const toggle = document.getElementById('transToggle');
  const body = document.getElementById('textBody');
  toggle.addEventListener('click', () => {
    body.classList.toggle('show-trans');
    const on = body.classList.contains('show-trans');
    toggle.classList.toggle('on', on);
    toggle.textContent = on ? 'Übersetzung verbergen' : 'Übersetzung zeigen';
  });

  // Per-paragraph speakers
  body.querySelectorAll('p[data-para]').forEach(p => {
    const idx = parseInt(p.dataset.para);
    wireSpeaker(p, text.paras[idx].de);
  });
  // Glossary speakers
  document.querySelectorAll('.gloss-row[data-gloss]').forEach(row => {
    const idx = parseInt(row.dataset.gloss);
    // strip parenthetical grammar notes like "(+ Dativ)" for cleaner TTS
    wireSpeaker(row, text.gloss[idx][0].replace(/\s*\(.*?\)\s*/g, ' ').trim());
  });
  // Read whole text (paragraph by paragraph)
  const readAll = document.getElementById('readAll');
  if (readAll) {
    readAll.addEventListener('click', () => {
      if (!SPEECH_OK) return;
      window.speechSynthesis.cancel();
      text.paras.forEach(p => {
        const u = new SpeechSynthesisUtterance(p.de);
        u.lang = 'de-DE';
        if (deVoice) u.voice = deVoice;
        u.rate = 0.92;
        window.speechSynthesis.speak(u);
      });
    });
  }
}

/* =========================================================================
   ROUTER
   ========================================================================= */
function renderMain() {
  const modeBar = document.getElementById('modeBar');

  // Grammatik & Texte are study sections — hide the vocab mode bar
  if (state.level === 'Grammatik') {
    modeBar.style.display = 'none';
    renderGrammar();
    return;
  }
  if (state.level === 'Texte') {
    modeBar.style.display = 'none';
    renderTexte();
    return;
  }

  modeBar.style.display = '';
  if (state.mode === 'browse') {
    renderBrowse();
  } else if (state.mode === 'flash') {
    initFlashDeck();
    renderFlash();
  } else if (state.mode === 'write') {
    initWriteDeck();
    renderWrite();
  } else if (state.mode === 'quiz') {
    initQuizDeck();
    currentQuizQ = null;
    renderQuiz();
  } else if (state.mode === 'match') {
    initMatch();
    renderMatch();
  }
}

/* =========================================================================
   INIT
   ========================================================================= */
document.querySelectorAll('#levelToggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (SPEECH_OK) window.speechSynthesis.cancel();
    document.querySelectorAll('#levelToggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.level = btn.dataset.level;
    // Set a sensible default selection for the section
    if (state.level === 'Grammatik') state.category = GRAMMAR_ORDER[0];
    else if (state.level === 'Texte') state.category = TEXTS[0].id;
    else state.category = 'all';
    renderSidebar();
    renderMain();
  });
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (SPEECH_OK) window.speechSynthesis.cancel();
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    renderMain();
  });
});

document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value;
  if ((state.level === 'A1' || state.level === 'A2' || state.level === 'Alltag') && state.mode === 'browse') {
    renderBrowse();
  }
});

renderSidebar();
renderMain();
</script>
